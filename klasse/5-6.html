<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mathwelt — Klasse 5/6</title>
<link rel="stylesheet" href="../styles/base.css">
<style>
/* ════════════════════════════════════════
   KLASSE 5/6 STYLES
   ════════════════════════════════════════ */

/* ── Header ── */
.kl-header {
  background: linear-gradient(135deg, #1a1f3a 0%, #2e1a4a 100%);
  border-bottom: 3px solid rgba(255,211,61,0.3);
  padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .75rem;
  position: sticky; top: 0; z-index: 50;
}
.kl-logo { font-size: 1.3rem; color: var(--yellow); letter-spacing: .05em; }
.kl-logo span { color: var(--text); font-size: .9rem; font-family: 'Nunito', sans-serif; font-weight: 600; }
.kl-header-btns { display: flex; gap: .5rem; flex-wrap: wrap; }

/* ── Main layout ── */
.kl-main {
  display: grid;
  grid-template-columns: 1fr 360px;
  gap: 1.5rem;
  max-width: 1300px;
  margin: 0 auto;
  padding: 1.5rem;
}
@media (max-width: 900px) { .kl-main { grid-template-columns: 1fr; } }

/* ── Auswertung: full-width section below kl-main, not squeezed into sidebar ── */
.auswertung-section {
  max-width: 1300px;
  margin: 0 auto;
  padding: 0 1.5rem 3rem;
}
.auswertung-card {
  background: var(--surface);
  border-radius: 20px;
  border: 3px solid rgba(255,211,61,0.25);
  overflow: hidden;
}
.auswertung-header {
  padding: 1.2rem 1.6rem;
  background: rgba(255,211,61,0.06);
  border-bottom: 2px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; gap: .8rem; flex-wrap: wrap;
  font-family: 'Fredoka One', cursive; font-size: 1.3rem; color: var(--yellow);
}
.auswertung-body { padding: 1.6rem; }

/* ── Classroom panel ── */
.klassenzimmer-panel { display: flex; flex-direction: column; gap: 1rem; }

.klasse-info {
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
.klasse-titel { font-size: 1.8rem; color: var(--yellow); }
.klasse-meta  { font-size: .85rem; color: var(--muted); }

/* ── Tafel (blackboard behind class) ── */
.tafel-wrap {
  background: #1c2a1c;
  border-radius: 16px;
  border: 4px solid #5a4a20;
  padding: 1rem 1rem .5rem;
  position: relative;
  box-shadow: inset 0 0 40px rgba(0,0,0,0.4), 0 8px 24px rgba(0,0,0,0.4);
}
.tafel-line {
  font-family: 'Fredoka One', cursive;
  color: rgba(255,255,255,0.15);
  font-size: .75rem;
  letter-spacing: .1em;
  text-align: center;
  margin-bottom: .5rem;
}

/* ── Kids grid ── */
.kinder-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
  gap: .75rem;
  padding: .75rem;
}

.kind-card {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  cursor: pointer;
  transition: transform .15s ease;
  position: relative;
}
.kind-card:hover { transform: translateY(-4px) scale(1.04); }
.kind-card:hover .kind-avatar-wrap { box-shadow: 0 8px 24px rgba(255,211,61,0.4); border-color: var(--yellow); }

.kind-avatar-wrap {
  width: 72px; height: 80px;
  background: var(--surface2);
  border-radius: 16px;
  border: 3px solid rgba(255,255,255,0.1);
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s ease;
  padding: 2px;
}
.kind-avatar-wrap svg { width: 100%; height: 100%; }

.kind-name {
  font-size: .7rem; font-weight: 800;
  color: var(--text);
  text-align: center;
  line-height: 1.2;
}

/* Easter egg glow */
.kind-card.hat-easter .kind-avatar-wrap { border-color: rgba(168,85,247,0.5); }
.kind-card.hat-easter .kind-name::after { content: '✨'; font-size: .6rem; }

/* ── Sidebar / Tools ── */
.sidebar { display: flex; flex-direction: column; gap: 1rem; }

.tool-panel {
  background: var(--surface);
  border-radius: 16px;
  border: 3px solid rgba(255,255,255,0.08);
  overflow: hidden;
}
.tool-header {
  padding: .85rem 1.2rem;
  background: rgba(255,255,255,0.04);
  border-bottom: 2px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: .6rem;
  font-family: 'Fredoka One', cursive; font-size: 1rem; color: var(--yellow);
}
.tool-body { padding: 1rem 1.2rem; }

/* ── Merkmal selector ── */
.merkmal-btns { display: flex; flex-wrap: wrap; gap: .5rem; }
.merkmal-btn {
  padding: .4rem .9rem; border-radius: 100px;
  font-size: .78rem; font-weight: 700;
  cursor: pointer; border: 2px solid rgba(255,255,255,0.15);
  background: var(--surface2); color: var(--muted);
  transition: all .15s ease;
}
.merkmal-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.3); }
.merkmal-btn.active { background: var(--yellow); color: #1a1f3a; border-color: var(--yellow); }

/* ── Live Strichliste ── */
.strich-liste { display: flex; flex-direction: column; gap: .4rem; margin-top: .75rem; }
.strich-row {
  display: flex; align-items: center; gap: .5rem;
  padding: .4rem .6rem; border-radius: 8px;
  background: rgba(255,255,255,0.03);
  transition: background .2s;
}
.strich-row.just-added { animation: flashRow .4s ease; }
@keyframes flashRow {
  0%   { background: rgba(255,211,61,0.25); }
  100% { background: rgba(255,255,255,0.03); }
}
.strich-key   { font-size: .78rem; font-weight: 700; min-width: 90px; color: var(--text); }
.strich-marks { font-family: monospace; font-size: .85rem; color: var(--mint); flex: 1; letter-spacing: .05em; }
.strich-count { font-size: .85rem; font-weight: 800; color: var(--yellow); min-width: 24px; text-align: right; }

/* ── Daten-Auswertung tabs ── */
.auswert-tabs { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.auswert-tab {
  padding: .35rem .9rem; border-radius: 100px;
  font-size: .75rem; font-weight: 700;
  cursor: pointer; border: 2px solid rgba(255,255,255,0.12);
  background: transparent; color: var(--muted);
  transition: all .15s;
}
.auswert-tab.active { background: var(--mint); color: #1a1f3a; border-color: var(--mint); }

/* ── Häufigkeitstabelle styles ── */
.tabelle-wrap { overflow-x: auto; }
.tabelle-titel { font-family: 'Fredoka One', cursive; color: var(--yellow); margin-bottom: .75rem; font-size: 1rem; }
.haeufig-tabelle { width: 100%; border-collapse: collapse; font-size: .82rem; }
.haeufig-tabelle th {
  text-align: left; padding: .5rem .6rem;
  color: var(--muted); font-weight: 700; font-size: .72rem;
  text-transform: uppercase; letter-spacing: .05em;
  border-bottom: 2px solid rgba(255,255,255,0.08);
}
.haeufig-tabelle td { padding: .45rem .6rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
.haeufig-tabelle tr:hover td { background: rgba(255,255,255,0.03); }
.gesamt-row td { border-top: 2px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); }
.tabelle-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; vertical-align: middle; }
.zahl-cell { text-align: right; font-weight: 700; font-family: monospace; }

/* Strichliste in tabelle */
.strichliste { font-family: monospace; letter-spacing: .06em; color: var(--mint); }
.strich { color: var(--mint); }
.strich-querstrich { color: var(--yellow); }

/* ── Charts ── */
.chart-canvas-wrap {
  width: 100%; border-radius: 12px;
  background: rgba(255,255,255,0.03);
  padding: 1rem; margin: .5rem 0;
}
canvas.chart-canvas { width: 100%; height: 420px; display: block; }

/* ── Kenngrößen ── */
.kenngroessen-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1.2rem; margin-top: .75rem; max-width: 700px; margin-left: auto; margin-right: auto; }
@media (max-width: 700px) { .kenngroessen-grid { grid-template-columns: 1fr; } }
.kg-card {
  background: var(--surface2); border-radius: 16px; padding: 1.6rem 1.2rem;
  border: 2px solid rgba(255,255,255,0.07); text-align: center;
}
.kg-label { font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .5rem; }
.kg-value { font-family: 'Fredoka One', cursive; font-size: 2.6rem; color: var(--yellow); line-height: 1; }

/* ── Diagramm-Werkstatt: drag the bars into the coordinate system ── */
.werkstatt-wrap { display: flex; flex-direction: column; gap: 1.2rem; align-items: center; }
.werkstatt-hinweis {
  font-size: .85rem; color: var(--muted); text-align: center; max-width: 560px; line-height: 1.7;
}
.werkstatt-hinweis strong { color: var(--text); }

.werkbank {
  display: flex; gap: .9rem; flex-wrap: wrap; justify-content: center;
  padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 14px;
  width: 100%; max-width: 760px; min-height: 70px;
}
.werk-block {
  display: flex; flex-direction: column; align-items: center; gap: .3rem;
  cursor: grab; user-select: none; touch-action: none;
}
.werk-block.dragging { opacity: 0.35; }
.werk-block.placed { opacity: 0.25; pointer-events: none; }
.werk-block-bar {
  width: 46px; height: 46px; border-radius: 8px;
  border: 3px solid #1a1f3a;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: .8rem; color: #1a1f3a;
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.werk-block-label { font-size: .68rem; color: var(--muted); font-weight: 700; text-align: center; max-width: 64px; }

.koordinatensystem-wrap {
  width: 100%; max-width: 760px;
  background: rgba(255,255,255,0.02);
  border-radius: 14px; padding: 1rem;
}
svg#koordSystem { width: 100%; height: 440px; display: block; }
.koord-droptarget { fill: transparent; }
.koord-droptarget.drag-over { fill: rgba(255,211,61,0.08); }

.werkstatt-feedback { font-family: 'Fredoka One', cursive; font-size: 1rem; min-height: 1.6rem; text-align: center; }
.werkstatt-feedback.richtig { color: var(--mint); }
.werkstatt-feedback.falsch  { color: var(--red); }

.werkstatt-actions { display: flex; gap: .75rem; }

/* ── Kenngrößen-Labor ── */
.kg-lab-tabs { display: flex; gap: .5rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.2rem; }
.kg-lab-tab {
  padding: .5rem 1.1rem; border-radius: 100px; font-size: .82rem; font-weight: 700;
  cursor: pointer; border: 2px solid rgba(255,255,255,0.12);
  background: var(--surface2); color: var(--muted); transition: all .15s;
}
.kg-lab-tab.active { background: var(--yellow); color: #1a1f3a; border-color: var(--yellow); }
.kg-lab-tab:hover:not(.active) { color: var(--text); border-color: rgba(255,255,255,0.25); }

.kg-aufgabe-hinweis {
  font-size: .85rem; color: var(--muted); line-height: 1.7;
  max-width: 620px; margin: 0 auto 1.2rem; text-align: center;
}
.kg-aufgabe-hinweis strong { color: var(--text); }

.kg-sortier-area {
  display: flex; gap: .6rem; flex-wrap: wrap; justify-content: center;
  padding: 1rem; background: rgba(255,255,255,0.03); border-radius: 14px;
  margin-bottom: 1rem;
}
.kg-karte {
  width: 52px; height: 52px; border-radius: 10px;
  background: var(--surface2); border: 3px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--text);
  cursor: pointer; transition: all .15s ease;
}
.kg-karte:hover { transform: translateY(-3px); border-color: var(--yellow); }
.kg-karte-mitte { background: var(--yellow); color: #1a1f3a; border-color: #c9a83c; }
.kg-karte-min { background: #22C55E; color: #fff; border-color: #15803d; }
.kg-karte-max { background: #EF4444; color: #fff; border-color: #b91c1c; }
.kg-karte-dragging { opacity: .4; transform: scale(0.95); }
.kg-karte-dragover { border-color: var(--yellow) !important; background: rgba(255,211,61,0.15); transform: scale(1.08); }

.kg-sortier-actions { display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; margin-bottom: .8rem; }

.kg-feedback { font-family: 'Fredoka One', cursive; font-size: .95rem; min-height: 1.5rem; text-align: center; color: var(--muted); }
.kg-feedback.richtig { color: var(--mint); }
.kg-feedback.falsch  { color: var(--red); }

.kg-ergebnis-box {
  background: rgba(255,211,61,0.08); border: 2px solid rgba(255,211,61,0.3);
  border-radius: 12px; padding: 1rem 1.3rem; margin-top: .8rem; text-align: center;
}
.kg-rechenweg { font-size: .95rem; color: var(--text); }
.kg-rechenweg strong { color: var(--yellow); font-size: 1.2rem; }

.kg-modus-zeile { display: flex; gap: .6rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap; }
.kg-modus-tag {
  padding: .4rem 1rem; border-radius: 100px; font-size: .78rem; font-weight: 700;
  background: var(--surface2); color: var(--muted); border: 2px solid rgba(255,255,255,0.1);
}
.kg-modus-tag.active { background: rgba(255,211,61,0.15); color: var(--yellow); border-color: rgba(255,211,61,0.4); }

/* Ausgleichs-Modell (Mittelwert) */
.kg-ausgleich-stage {
  position: relative;
  display: flex; align-items: flex-end; justify-content: center; gap: 1rem;
  height: 280px; padding: 1rem 1.5rem 0;
  background: rgba(255,255,255,0.03); border-radius: 14px;
  margin-bottom: 1rem; overflow: visible;
}
.kg-ausgleich-linie {
  position: absolute; left: 1rem; right: 1rem;
  height: 2px; background: repeating-linear-gradient(90deg, var(--mint), var(--mint) 6px, transparent 6px, transparent 12px);
  z-index: 1;
}
.kg-ausgleich-bars { display: flex; align-items: flex-end; gap: 1rem; z-index: 2; height: 100%; }
.kg-ausgleich-col { display: flex; flex-direction: column; align-items: center; gap: .4rem; height: 100%; justify-content: flex-end; }
.kg-ausgleich-bar {
  width: 38px; background: linear-gradient(180deg, #FF6B35, #FFD93D);
  border-radius: 8px 8px 0 0; border: 3px solid #1a1f3a; border-bottom: none;
  position: relative; transition: background .3s ease;
  display: flex; align-items: flex-start; justify-content: center;
  min-height: 4px;
}
.kg-ausgleich-bar.kg-bar-solved { background: linear-gradient(180deg, #4ECDC4, #22C55E); }
.kg-bar-handle {
  position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
  width: 28px; height: 20px; border-radius: 6px;
  background: var(--yellow); border: 2px solid #1a1f3a;
  cursor: ns-resize; touch-action: none;
  display: flex; align-items: center; justify-content: center;
}
.kg-bar-handle::before { content: '↕'; font-size: .7rem; color: #1a1f3a; font-weight: 800; }
.kg-bar-val {
  position: absolute; top: -38px; left: 50%; transform: translateX(-50%);
  font-size: .75rem; font-weight: 800; color: var(--text);
}
.kg-bar-label { font-size: .68rem; color: var(--muted); }

/* Linienbeschriftung */
.kg-linie-label {
  position: absolute; left: 4px; top: -18px;
  font-size: .7rem; font-weight: 800; color: var(--mint);
  white-space: nowrap; background: var(--surface2);
  padding: .1rem .4rem; border-radius: 4px;
}

/* Tabelle: Bruch + Prozent gestapelt */
.anteil-bruch { display: block; font-size: .78rem; font-weight: 700; color: var(--text); }
.anteil-pct   { display: block; font-size: .68rem; color: var(--muted); }

/* Strichliste: Gruppen + Summe darunter */
.strich-gruppe { font-family: monospace; letter-spacing: .05em; color: var(--mint); }
.strich-summe  { font-size: .62rem; color: var(--muted); margin-top: .15rem; }

.kg-sub   { font-size: .65rem; color: var(--muted); margin-top: .2rem; }

/* ── Modal — Kind-Profil ── */
.kind-modal-avatar { width: 110px; height: 125px; margin: 0 auto 1rem; }
.kind-modal-avatar svg { width: 100%; height: 100%; }
.kind-modal-name { font-family: 'Fredoka One', cursive; font-size: 1.6rem; text-align: center; color: var(--yellow); margin-bottom: .25rem; }
.kind-modal-klasse { text-align: center; color: var(--muted); font-size: .8rem; margin-bottom: 1.2rem; }
.kind-speech-bubble {
  background: var(--surface2);
  border-radius: 16px 16px 16px 4px;
  padding: 1rem 1.2rem;
  font-size: .9rem;
  line-height: 1.7;
  color: var(--text);
  position: relative;
  margin-bottom: 1rem;
  border: 2px solid rgba(255,255,255,0.08);
}
.kind-speech-bubble::before {
  content: '💬';
  position: absolute;
  top: -14px; left: 12px;
  font-size: 1.1rem;
}
.kind-facts {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .5rem; margin-top: .75rem;
}
.kind-fact {
  background: rgba(255,255,255,0.04);
  border-radius: 10px; padding: .6rem .8rem;
  font-size: .78rem;
}
.kind-fact-label { color: var(--muted); font-size: .65rem; text-transform: uppercase; letter-spacing: .05em; }
.kind-fact-value { font-weight: 800; margin-top: .15rem; }

/* Easter egg modal */
.easter-badge {
  background: linear-gradient(135deg, #A855F7, #FF6B9D);
  color: white; font-size: .7rem; font-weight: 800;
  padding: .2rem .7rem; border-radius: 100px;
  display: inline-block; margin: 0 auto .5rem;
  text-align: center;
}

/* ── Multiple-choice quiz inside the modal ── */
.mc-options {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: .5rem;
}
.mc-option {
  padding: .65rem .8rem; border-radius: 10px;
  font-family: 'Nunito', sans-serif; font-size: .82rem; font-weight: 700;
  cursor: pointer; border: 2px solid rgba(255,255,255,0.12);
  background: var(--surface2); color: var(--text);
  transition: all .15s ease;
}
.mc-option:hover { border-color: var(--yellow); background: rgba(255,211,61,0.08); transform: translateY(-1px); }
.mc-option.mc-wrong { animation: mcShake .4s ease; border-color: var(--red); background: rgba(239,68,68,0.15); }
@keyframes mcShake {
  0%,100% { transform: translateX(0); }
  25%     { transform: translateX(-5px); }
  75%     { transform: translateX(5px); }
}

/* ── Fortschrittsbalken (wie viele Kinder befragt) ── */
.fortschritt-wrap { margin-top: .75rem; }
.fortschritt-label { font-size: .72rem; color: var(--muted); margin-bottom: .3rem; display: flex; justify-content: space-between; }
.fortschritt-track { height: 8px; background: rgba(255,255,255,0.08); border-radius: 100px; overflow: hidden; }
.fortschritt-fill  { height: 100%; background: var(--mint); border-radius: 100px; transition: width .4s ease; }

/* ── Neu generieren Button ── */
.neu-btn-wrap { text-align: center; padding: 1rem 0 .5rem; }

/* ── Empty state ── */
.empty-state { text-align: center; padding: 2rem 1rem; color: var(--muted); }
.empty-state .empty-icon { font-size: 2.5rem; margin-bottom: .5rem; }
.empty-state p { font-size: .85rem; line-height: 1.6; }
</style>
</head>
<body>

<!-- Header -->
<header class="kl-header">
  <div class="kl-logo">🏫 Mathwelt <span>/ Klasse 5 &amp; 6</span></div>
  <div class="kl-header-btns">
    <button class="btn btn-ghost" onclick="location.href='../jahrgang/5-6.html'">← Jahrgang 5/6</button>
    <button class="btn btn-yellow" onclick="neueKlasse()">🔄 Neue Klasse</button>
  </div>
</header>

<!-- Main -->
<div class="kl-main">

  <!-- LEFT: Klassenzimmer -->
  <div class="klassenzimmer-panel">
    <div class="klasse-info">
      <div>
        <div class="klasse-titel" id="klasseTitel">📚 Klasse 5a</div>
        <div class="klasse-meta" id="klasseInfo">— Kinder laden...</div>
      </div>
    </div>

    <div class="tafel-wrap">
      <div class="tafel-line">✦ KLICK AUF EIN KIND, UM ES KENNENZULERNEN ✦</div>
      <div class="kinder-grid" id="kinderGrid">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>

  <!-- RIGHT: Sidebar Tools -->
  <div class="sidebar">

    <!-- Strichliste Tool -->
    <div class="tool-panel">
      <div class="tool-header">📋 Strichliste</div>
      <div class="tool-body">
        <div style="font-size:.75rem;color:var(--muted);margin-bottom:.6rem">
          Welches Merkmal willst du untersuchen?
        </div>
        <div class="merkmal-btns" id="merkmalBtns"></div>

        <div class="fortschritt-wrap" id="fortschrittWrap" style="display:none">
          <div class="fortschritt-label">
            <span>Befragte Kinder</span>
            <span id="fortschrittText">0 / 0</span>
          </div>
          <div class="fortschritt-track">
            <div class="fortschritt-fill" id="fortschrittFill" style="width:0%"></div>
          </div>
        </div>

        <div class="strich-liste" id="strichListe">
          <div class="empty-state">
            <div class="empty-icon">👆</div>
            <p>Wähle ein Merkmal aus, dann klicke die Kinder an!</p>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Auswertung: full-width section, not squeezed into the sidebar -->
<div class="auswertung-section" id="auswertPanel" style="display:none">
  <div class="auswertung-card">
    <div class="auswertung-header">
      📊 Auswertung
      <div class="auswert-tabs" id="auswertTabs" style="margin-left:auto">
        <button class="auswert-tab active" onclick="setTab('tabelle')">Tabelle</button>
        <button class="auswert-tab" onclick="setTab('saeule')">Säule</button>
        <button class="auswert-tab" onclick="setTab('balken')">Balken</button>
        <button class="auswert-tab" onclick="setTab('werkstatt')">🛠️ Diagramm-Werkstatt</button>
        <button class="auswert-tab" onclick="setTab('kenngroessen')">Kenngrößen</button>
      </div>
    </div>
    <div class="auswertung-body" id="auswertContent"></div>
  </div>
</div>

<!-- Kind-Modal -->
<div class="modal-overlay hidden" id="kindModal" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="document.getElementById('kindModal').classList.add('hidden')">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Scripts -->
<script src="../js/avatars.js"></script>
<script src="../js/kinder.js"></script>
<script src="../js/charts.js"></script>
<script src="../js/werkstatt.js"></script>
<script src="../js/kenngroessen-lab.js"></script>
<script>
/* ════════════════════════════════════════
   KLASSE 5/6 — App Logic
   ════════════════════════════════════════ */

const MERKMALE = [
  { id: 'schulweg',   label: '🚶 Schulweg',      fn: k => k.schulweg.label,
    alleOptionen: ['zu Fuß', 'Fahrrad', 'Bus', 'Auto (Eltern)', 'Bahn', 'Roller', 'Einrad'] },
  { id: 'haustier',   label: '🐾 Haustier',       fn: k => k.haustiere.length > 0 ? 'Ja' : 'Nein',
    alleOptionen: ['Ja', 'Nein'] },
  { id: 'geschwister',label: '👨‍👩‍👧 Geschwister',    fn: k => String(k.geschwister),
    alleOptionen: ['0', '1', '2', '3', '4'] },
  { id: 'fach',       label: '📚 Lieblingsfach',  fn: k => k.lieblingsfach,
    alleOptionen: ['Mathe','Sport','Kunst','Musik','Deutsch','Englisch','Sachkunde','Informatik','Geschichte','Biologie','Pause 😄'] },
];

let klasse       = [];
let klassenName  = '5a'; // current class label, e.g. "5c" or "6f"
let aktivMerkmal = null;
let strichDaten  = {};    // { key: count }
let erfasste     = new Set(); // kind IDs already tallied
let aktuellerTab = 'tabelle';

const KLASSEN_BUCHSTABEN = ['a', 'b', 'c', 'd', 'e', 'f'];

function zufaelligeKlassenbezeichnung() {
  const jahrgang   = Math.random() < 0.5 ? 5 : 6;
  const buchstabe  = KLASSEN_BUCHSTABEN[Math.floor(Math.random() * KLASSEN_BUCHSTABEN.length)];
  return `${jahrgang}${buchstabe}`;
}

/* ── Init ── */
function neueKlasse() {
  const n = 20 + Math.floor(Math.random() * 6); // 20-25
  klassenName  = zufaelligeKlassenbezeichnung();
  klasse       = KinderGen.generateKlasse(n, klassenName);
  strichDaten  = {};
  erfasste     = new Set();
  aktivMerkmal = null;
  renderKlasse();
  renderMerkmale();
  document.getElementById('strichListe').innerHTML =
    '<div class="empty-state"><div class="empty-icon">👆</div><p>Wähle ein Merkmal aus, dann klicke die Kinder an!</p></div>';
  document.getElementById('fortschrittWrap').style.display = 'none';
  document.getElementById('auswertPanel').style.display = 'none';
  document.getElementById('klasseTitel').textContent = `📚 Klasse ${klassenName}`;
  document.getElementById('klasseInfo').textContent =
    `${klasse.length} Schülerinnen und Schüler`;
}

/* ── Render class grid ── */
function renderKlasse() {
  const grid = document.getElementById('kinderGrid');
  grid.innerHTML = klasse.map(k => {
    const hasEaster = k.haustiere.some(h => h.easter) || k.schulweg.easter;
    const avatar    = AvatarGen.generate(k.avatarSeed);
    return `<div class="kind-card ${hasEaster ? 'hat-easter' : ''}"
                 id="kcard-${k.id}"
                 onclick="kindAnklicken(${k.id})">
      <div class="kind-avatar-wrap">${avatar}</div>
      <div class="kind-name">${k.vorname}<br><span style="font-weight:600;color:var(--muted);font-size:.62rem">${k.nachname}</span></div>
    </div>`;
  }).join('');
}

/* ── Render merkmal buttons ── */
function renderMerkmale() {
  const wrap = document.getElementById('merkmalBtns');
  wrap.innerHTML = MERKMALE.map(m =>
    `<button class="merkmal-btn ${aktivMerkmal === m.id ? 'active' : ''}"
             onclick="merkmalWaehlen('${m.id}')">${m.label}</button>`
  ).join('');
}

/* ── Select merkmal ── */
function merkmalWaehlen(id) {
  if (aktivMerkmal === id) return;
  aktivMerkmal = id;
  strichDaten  = {};
  erfasste     = new Set();
  renderMerkmale();
  renderStrichliste();
  document.getElementById('fortschrittWrap').style.display = 'block';
  document.getElementById('auswertPanel').style.display = 'none';
  updateFortschritt();
  // Reset card highlights
  klasse.forEach(k => {
    const card = document.getElementById('kcard-' + k.id);
    if (card) card.style.opacity = '1';
  });
}

/* ── Kind clicked (in classroom) ──
   Just opens the profile. Tallying happens via an explicit button inside the modal,
   so the child has to actively decide and record the data point themselves. */
function kindAnklicken(id) {
  zeigeKindProfil(id);
}

/* ── Strich aktiv setzen — called once the child picked the CORRECT answer ── */
function strichEintragen(id, wert) {
  if (erfasste.has(id)) return;

  erfasste.add(id);
  strichDaten[wert] = (strichDaten[wert] || 0) + 1;

  // Dim tallied card in classroom
  const card = document.getElementById('kcard-' + id);
  if (card) card.style.opacity = '0.45';

  renderStrichliste(wert);
  updateFortschritt();

  // Update the modal button area to show it's done
  renderStrichButton(id);

  // All tallied → show auswertung
  if (erfasste.size === klasse.length) showAuswertung();
}

/* ── Multiple-choice answer clicked ── */
function antwortWaehlen(id, gewaehlt, richtig) {
  const area = document.getElementById('strichButtonArea');
  if (!area) return;

  if (gewaehlt === richtig) {
    strichEintragen(id, richtig);
  } else {
    // Wrong answer: flash red feedback, let them try again (don't reveal which is correct)
    const btn = [...area.querySelectorAll('.mc-option')].find(b => b.dataset.value === gewaehlt);
    if (btn) {
      btn.classList.add('mc-wrong');
      setTimeout(() => btn.classList.remove('mc-wrong'), 500);
    }
    const hint = document.getElementById('mcHint');
    if (hint) {
      hint.textContent = '❌ Nicht ganz — lies nochmal genau nach!';
      hint.style.color = 'var(--red)';
    }
  }
}

function shuffleArr(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Build 3-4 multiple choice options: 1 correct + 2-3 distractors from the Merkmal's option pool */
function buildOptionen(merkmal, richtig) {
  const pool = merkmal.alleOptionen.filter(o => o !== richtig);
  const anzahlDistraktoren = Math.min(pool.length, merkmal.alleOptionen.length <= 4 ? 1 : 3);
  const distraktoren = shuffleArr(pool).slice(0, anzahlDistraktoren);
  return shuffleArr([richtig, ...distraktoren]);
}

/* ── Strichliste ── */
function renderStrichliste(flashKey) {
  const liste = document.getElementById('strichListe');
  if (!aktivMerkmal || Object.keys(strichDaten).length === 0) {
    liste.innerHTML = '<div class="empty-state"><div class="empty-icon">👆</div><p>Öffne ein Kind und trage seinen Wert selbst in die Strichliste ein!</p></div>';
    return;
  }
  const sorted = Object.entries(strichDaten).sort((a,b) => b[1]-a[1]);
  liste.innerHTML = sorted.map(([key, count]) => `
    <div class="strich-row ${key === flashKey ? 'just-added' : ''}">
      <span class="strich-key">${key}</span>
      <span class="strich-marks">${strichMarks(count)}</span>
      <span class="strich-count">${count}</span>
    </div>`).join('');
}

function strichMarks(n) {
  let s = '';
  for (let i = 0; i < n; i++) {
    if (i > 0 && i % 5 === 4) s += '<span style="color:var(--yellow)">╱</span>';
    else s += '|';
    if ((i+1) % 5 === 0 && i < n-1) s += ' ';
  }
  return s;
}

function updateFortschritt() {
  const n    = klasse.length;
  const done = erfasste.size;
  const pct  = n > 0 ? (done / n * 100) : 0;
  document.getElementById('fortschrittText').textContent = `${done} / ${n}`;
  document.getElementById('fortschrittFill').style.width = pct + '%';
}

/* ── Auswertung ── */
function showAuswertung() {
  document.getElementById('auswertPanel').style.display = 'block';
  document.getElementById('auswertPanel').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  renderTab();
}

function setTab(tab) {
  aktuellerTab = tab;
  document.querySelectorAll('.auswert-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderTab();
}

function renderTab() {
  const container = document.getElementById('auswertContent');
  const merkmal   = MERKMALE.find(m => m.id === aktivMerkmal);
  if (!merkmal) return;

  if (aktuellerTab === 'tabelle') {
    Charts.renderTabelle(container, strichDaten, merkmal.label);

  } else if (aktuellerTab === 'saeule') {
    container.innerHTML = '<div class="chart-canvas-wrap"><canvas class="chart-canvas" id="chartCanvas"></canvas></div>';
    requestAnimationFrame(() => {
      const cv = document.getElementById('chartCanvas');
      Charts.renderSaeulen(cv, strichDaten, merkmal.label, { achsenTitel: merkmal.label.replace(/^\S+\s/, '') });
    });

  } else if (aktuellerTab === 'balken') {
    container.innerHTML = '<div class="chart-canvas-wrap"><canvas class="chart-canvas" id="chartCanvas"></canvas></div>';
    requestAnimationFrame(() => {
      const cv = document.getElementById('chartCanvas');
      Charts.renderBalken(cv, strichDaten, merkmal.label);
    });

  } else if (aktuellerTab === 'werkstatt') {
    Werkstatt.render(container, strichDaten, merkmal);

  } else if (aktuellerTab === 'kenngroessen') {
    KenngroessenLab.render(container, strichDaten, merkmal.label.replace(/^\S+\s/, ''));
  }
}

/* ── Kind Profil Modal ── */
function zeigeKindProfil(id) {
  const kind   = klasse.find(k => k.id === id);
  if (!kind) return;
  const avatar = AvatarGen.generate(kind.avatarSeed);
  const hasEaster = kind.haustiere.some(h => h.easter) || kind.schulweg.easter;

  const hatTiereText = kind.haustiere.length > 0
    ? kind.haustiere.map(h => h.emoji + ' ' + h.name).join(', ')
    : '— kein Haustier';

  const content = `
    <div class="kind-modal-avatar">${avatar}</div>
    ${hasEaster ? '<div style="text-align:center"><span class="easter-badge">✨ Besonderes Kind!</span></div>' : ''}
    <div class="kind-modal-name">${kind.vorname} ${kind.nachname}</div>
    <div class="kind-modal-klasse">Klasse ${klassenName} • ${kind.geschlecht === 'm' ? 'Schüler' : kind.geschlecht === 'w' ? 'Schülerin' : 'Schüler:in'}</div>
    <div class="kind-speech-bubble">
      ${kind.saetze.map(s => `<p>${s}</p>`).join('')}
    </div>
    <div class="kind-facts">
      <div class="kind-fact">
        <div class="kind-fact-label">Schulweg</div>
        <div class="kind-fact-value">${kind.schulweg.emoji} ${kind.schulweg.art}</div>
      </div>
      <div class="kind-fact">
        <div class="kind-fact-label">Geschwister</div>
        <div class="kind-fact-value">${kind.geschwister === 0 ? '👤 Einzelkind' : '👨‍👩‍👧 ' + kind.geschwister}</div>
      </div>
      <div class="kind-fact">
        <div class="kind-fact-label">Haustiere</div>
        <div class="kind-fact-value">${hatTiereText}</div>
      </div>
      <div class="kind-fact">
        <div class="kind-fact-label">Lieblingsfach</div>
        <div class="kind-fact-value">📚 ${kind.lieblingsfach}</div>
      </div>
    </div>
    <div id="strichButtonArea" style="margin-top:1.2rem"></div>`;

  document.getElementById('modalContent').innerHTML = content;
  document.getElementById('kindModal').classList.remove('hidden');
  renderStrichButton(id);
}

/* ── Render the "Strich machen bei..." button inside the modal.
   Shows different states depending on whether a Merkmal is active
   and whether this child has already been tallied. ── */
function renderStrichButton(id) {
  const area = document.getElementById('strichButtonArea');
  if (!area) return;

  if (!aktivMerkmal) {
    area.innerHTML = `
      <div style="background:rgba(255,255,255,0.04);border-radius:12px;padding:.8rem 1rem;font-size:.78rem;color:var(--muted);text-align:center;line-height:1.6">
        Wähle rechts erst ein <strong style="color:var(--text)">Merkmal</strong> aus der Strichliste,
        dann kannst du hier einen Strich für dieses Kind setzen.
      </div>`;
    return;
  }

  const merkmal = MERKMALE.find(m => m.id === aktivMerkmal);
  const wert    = merkmal.fn(klasse.find(k => k.id === id));

  if (erfasste.has(id)) {
    area.innerHTML = `
      <div style="background:rgba(34,197,94,0.1);border:2px solid rgba(34,197,94,0.3);border-radius:12px;padding:.8rem 1rem;font-size:.82rem;text-align:center;color:#4ade80;font-weight:700">
        ✓ Schon erfasst: ${merkmal.label.replace(/^\S+\s/, '')} = ${wert}
      </div>`;
  } else {
    const optionen = buildOptionen(merkmal, wert);
    area.innerHTML = `
      <div style="font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:.6rem">
        Welchen Wert hat ${klasse.find(k=>k.id===id).vorname} beim Merkmal
        <strong style="color:var(--text)">${merkmal.label.replace(/^\S+\s/, '')}</strong>?
      </div>
      <div class="mc-options">
        ${optionen.map(o => `
          <button class="mc-option" data-value="${o}" onclick="antwortWaehlen(${id}, '${o.replace(/'/g, "\\'")}', '${wert.replace(/'/g, "\\'")}')">
            ${o}
          </button>`).join('')}
      </div>
      <div id="mcHint" style="font-size:.74rem;text-align:center;margin-top:.5rem;min-height:1.1rem;color:var(--muted)"></div>`;
  }
}

function closeModal(e) {
  if (e.target === document.getElementById('kindModal')) {
    document.getElementById('kindModal').classList.add('hidden');
  }
}

/* ── Start ── */
neueKlasse();
</script>
</body>
</html>
