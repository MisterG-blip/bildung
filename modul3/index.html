<div class="m3-hero">
  <h1>Aus Struktur wird eine Zahl</h1>
  <p>Bisher habt ihr Ergebnisräume aufgebaut und Baumdiagramme gezeichnet. Jetzt geht es darum, aus dieser Struktur eine konkrete <strong>Wahrscheinlichkeit</strong> zu berechnen.</p>

<div class="m3-main" id="mainArea"></div>

<script>
/* ═══════════════════════ Hilfsfunktionen ═══════════════════════ */
/* Setzt den Inhalt von #mainArea neu, OHNE dass die Seite dabei
   nach oben springt (Höhenänderung des Inhalts würde sonst die
   Scroll-Position verschieben, weil oberhalb nichts mehr passt). */
function setMainHTML(html) {
  const el = document.getElementById('mainArea');
  const y = window.scrollY;
  el.innerHTML = html;
  window.scrollTo(0, y);
  requestAnimationFrame(() => window.scrollTo(0, y));
  return el;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function ggT(a, b) { return b === 0 ? a : ggT(b, a % b); }
function kuerze(z, n) { const g = ggT(z, n) || 1; return [z / g, n / g]; }
function bruchHTML(z, n, gross) {
  return `<span class="m3-bruch${gross ? ' gross' : ''}"><span class="z">${z}</span><span class="n">${n}</span></span>`;
}

/* ── Glücksrad als SVG zeichnen (statt Riesenrad-Emoji 🎡) ── */
function sektorPfad(cx, cy, r, start, ende) {
  const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
  const x2 = cx + r * Math.cos(ende),  y2 = cy + r * Math.sin(ende);
  const grossBogen = (ende - start) > Math.PI ? 1 : 0;
  return `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${grossBogen} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
}
function svgGluecksrad(sektoren, groesse) {
  const r = groesse / 2 - 4, cx = groesse / 2, cy = groesse / 2;
  let winkel = -Math.PI / 2, pfade = '';
  sektoren.forEach(s => {
    const naechster = winkel + s.anteil * Math.PI * 2;
    pfade += `<path d="${sektorPfad(cx, cy, r, winkel, naechster)}" fill="${s.farbe}" stroke="#1a1f3a" stroke-width="1.3"/>`;
    winkel = naechster;
  });
  return `<svg viewBox="0 0 ${groesse} ${groesse}" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <circle cx="${cx}" cy="${cy}" r="${r + 2.5}" fill="none" stroke="#1a1f3a" stroke-width="2.5"/>
    ${pfade}
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="#1a1f3a"/>
    <polygon points="${cx - 6},1 ${cx + 6},1 ${cx},11" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="1"/>
  </svg>`;
}
const RAD_FARBEN = ['#FF7A47', '#4ECDC4', '#FFD93D', '#C084FC', '#FF6B9D', '#60A5FA', '#22C55E', '#F87171'];
const RAD_FAIR = svgGluecksrad([0.25, 0.25, 0.25, 0.25].map((a, i) => ({ anteil: a, farbe: RAD_FARBEN[i] })), 60);
const RAD_UNFAIR = svgGluecksrad([
  { anteil: 0.7, farbe: '#F87171' }, { anteil: 0.12, farbe: '#4ECDC4' },
  { anteil: 0.1,  farbe: '#FFD93D' }, { anteil: 0.08, farbe: '#C084FC' },
], 60);
const RAD_8 = svgGluecksrad(Array(8).fill().map((_, i) => ({ anteil: 1 / 8, farbe: RAD_FARBEN[i] })), 40);
const RAD_8_KLEIN = svgGluecksrad(Array(8).fill().map((_, i) => ({ anteil: 1 / 8, farbe: RAD_FARBEN[i] })), 22);
const RAD_12 = svgGluecksrad(Array(12).fill().map((_, i) => ({ anteil: 1 / 12, farbe: RAD_FARBEN[i % RAD_FARBEN.length] })), 40);
const RAD_12_KLEIN = svgGluecksrad(Array(12).fill().map((_, i) => ({ anteil: 1 / 12, farbe: RAD_FARBEN[i % RAD_FARBEN.length] })), 22);

/* ── Zahlen-Würfel (z.B. 10-seitig) als einfaches Zahlenfeld statt Augen-Muster ── */
function svgZahlWuerfel(zahl, groesse) {
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <rect x="4" y="4" width="38" height="38" rx="8" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="2.5"/>
    <text x="23" y="29" font-size="17" font-weight="800" text-anchor="middle" fill="#1a1f3a" font-family="Nunito, sans-serif">${zahl}</text>
  </svg>`;
}
const D10_KLEIN = svgZahlWuerfel('10', 22);

/* ── Urne als SVG zeichnen (statt Tasche 👜 — "Kugelbeutel" heißt eigentlich Urne) ── */
function svgUrne(groesse) {
  const s = groesse / 46; // Skalierung relativ zum 46er-Referenzraster
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <path d="M8 16 Q1 16 1 22 Q1 27 8 27" fill="none" stroke="#1a1f3a" stroke-width="2"/>
    <path d="M38 16 Q45 16 45 22 Q45 27 38 27" fill="none" stroke="#1a1f3a" stroke-width="2"/>
    <path d="M11 11 C6 17, 6 29, 11 36 C14 40, 32 40, 35 36 C40 29, 40 17, 35 11 Z" fill="#B87355" stroke="#1a1f3a" stroke-width="2"/>
    <ellipse cx="23" cy="11" rx="12" ry="4" fill="#8A5638" stroke="#1a1f3a" stroke-width="2"/>
    <circle cx="17" cy="8" r="3.6" fill="#FF6B9D" stroke="#1a1f3a" stroke-width="1.2"/>
    <circle cx="24" cy="6" r="3.6" fill="#4ECDC4" stroke="#1a1f3a" stroke-width="1.2"/>
    <circle cx="30" cy="9" r="3.6" fill="#FFD93D" stroke="#1a1f3a" stroke-width="1.2"/>
  </svg>`;
}
const URNE = svgUrne(60);
const URNE_KLEIN = svgUrne(22);

/* ── Gezinkter Würfel als SVG zeichnen (statt Zielscheibe 🎯) — zeigt ein
   verstecktes Gewicht in einer Ecke, das erklärt, warum er nicht fair ist ── */
function svgGezinkterWuerfel(groesse) {
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <rect x="4" y="4" width="38" height="38" rx="8" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="2.5"/>
    <circle cx="13" cy="13" r="3.2" fill="#1a1f3a"/>
    <circle cx="13" cy="23" r="3.2" fill="#1a1f3a"/>
    <circle cx="13" cy="33" r="3.2" fill="#1a1f3a"/>
    <circle cx="33" cy="13" r="3.2" fill="#1a1f3a"/>
    <circle cx="33" cy="23" r="3.2" fill="#1a1f3a"/>
    <circle cx="33" cy="33" r="3.2" fill="#1a1f3a"/>
    <circle cx="33" cy="33" r="7.5" fill="#1a1f3a" opacity="0.4"/>
  </svg>`;
}
const WUERFEL_GEZINKT = svgGezinkterWuerfel(60);

/* ═══════════════════════ Teil 1: Laplace-Experimente sortieren ═══════════════════════ */
const TEIL1_KARTEN = [
  { emoji: '🪙', text: 'Du wirfst eine normale Münze. Kopf und Zahl sind möglich.', kat: 'ja',
    begruendung: 'Eine faire Münze zeigt Kopf und Zahl mit je 50 % — beide Ergebnisse sind gleich wahrscheinlich.' },
  { emoji: '🎲', text: 'Du würfelst mit einem ganz normalen Würfel.', kat: 'ja',
    begruendung: 'Jede der sechs Seiten eines fairen Würfels hat die gleiche Chance: je 1/6.' },
  { emoji: WUERFEL_GEZINKT, text: 'Du würfelst mit einem gezinkten Würfel, bei dem die 6 öfter fällt als alle anderen Zahlen.', kat: 'nein',
    begruendung: 'Die 6 ist wahrscheinlicher als die anderen Zahlen — die Ergebnisse sind nicht gleich wahrscheinlich.' },
  { emoji: RAD_FAIR, text: 'Ein Glücksrad hat vier gleich große Felder.', kat: 'ja',
    begruendung: 'Gleich große Felder bedeuten: jedes Feld hat die gleiche Trefferchance.' },
  { emoji: RAD_UNFAIR, text: 'Ein Glücksrad hat ein riesiges rotes Feld und drei winzige andere Felder.', kat: 'nein',
    begruendung: 'Das große Feld wird viel häufiger getroffen als die kleinen — nicht gleich wahrscheinlich.' },
  { emoji: '📌', text: 'Du wirfst einen Reißnagel. Er kann mit der Spitze nach oben oder nach unten landen.', kat: 'nein',
    begruendung: 'Durch seine Form landet ein Reißnagel fast immer öfter auf einer Seite als auf der anderen — auch wenn es nur zwei Möglichkeiten gibt.' },
  { emoji: '⚽', text: 'Ein Profi mit starker Schusstechnik tritt einen Elfmeter. Ergebnis: Tor oder kein Tor.', kat: 'nein',
    begruendung: 'Ein guter Schütze trifft viel häufiger, als dass er verschießt — Tor und kein Tor sind nicht gleich wahrscheinlich.' },
  { emoji: '🎫', text: 'Aus einer Box mit 20 gleich großen, gleich gefalteten Losen wird eines gezogen.', kat: 'ja',
    begruendung: 'Da alle Lose gleich groß und gleich gefaltet sind, hat jedes Los die gleiche Chance, gezogen zu werden.' },
  { emoji: '🌦️', text: 'Morgen regnet es — oder es regnet nicht.', kat: 'nein',
    begruendung: 'Nur weil es zwei Möglichkeiten gibt, heißt das nicht, dass sie gleich wahrscheinlich sind. Meistens ist eine der beiden wahrscheinlicher.' },
];

let t1 = { reihenfolge: [], index: 0, richtig: { ja: 0, nein: 0 }, sperre: false, antwort: null };

function zeigeIntro() {
  setMainHTML(`
    <div class="m3-karte m3-transition">
      <div class="m3-transition-emoji">⚖️</div>
      <div class="m3-transition-titel">Was ist ein Laplace-Experiment?</div>
      <div class="m3-merksatz-box" style="text-align:center;">
        <p style="margin-bottom:0;">Ein Zufallsexperiment, bei dem <strong>alle möglichen Ergebnisse gleich wahrscheinlich</strong> sind. Man sagt auch: es ist <strong>fair</strong>.</p>
      </div>
      <button class="btn btn-orange" onclick="starteTeil1()">Kann ich das erkennen? →</button>
    </div>
  `);
}

function starteTeil1() {
  t1 = { reihenfolge: shuffle(TEIL1_KARTEN), index: 0, richtig: { ja: 0, nein: 0 }, sperre: false, antwort: null };
  renderTeil1();
}

function renderTeil1() {
  const gesamt = t1.reihenfolge.length;

  if (t1.index >= gesamt) { zeigeUebergangZuMerksatz(); return; }

  const karte = t1.reihenfolge[t1.index];

  const kartenSlotHtml = t1.antwort
    ? `<div class="m3-feedback-karte ${t1.antwort.richtig ? 'richtig' : 'falsch'}">
         <div class="m3-feedback-text ${t1.antwort.richtig ? 'richtig' : 'falsch'}">${t1.antwort.richtig ? '✅ Richtig!' : t1.antwort.hinweis}</div>
         <div class="m3-begruendung">${karte.begruendung}</div>
       </div>`
    : `<div class="m3-sortier-karte" id="aktiveKarte">
         <div class="emoji">${karte.emoji}</div>
         <div class="txt">${karte.text}</div>
       </div>`;

  const unterKarteHtml = t1.antwort
    ? `<div class="m3-weiter-row">
         <button class="btn btn-orange" onclick="naechsteKarteT1()">${t1.index < gesamt - 1 ? 'Weiter →' : 'Weiter zum Merksatz →'}</button>
       </div>`
    : `<div class="m3-kategorien-row">
         <div class="m3-kategorie-btn nein" onclick="einordnenT1('nein')">
           <span class="m3-kategorie-icon">❌</span>
           <span class="m3-kategorie-label">Kein Laplace-Experiment</span>
           <span class="m3-kategorie-count">${t1.richtig.nein} richtig</span>
         </div>
         <div class="m3-kategorie-btn ja" onclick="einordnenT1('ja')">
           <span class="m3-kategorie-icon">✅</span>
           <span class="m3-kategorie-label">Laplace-Experiment</span>
           <span class="m3-kategorie-count">${t1.richtig.ja} richtig</span>
         </div>
       </div>`;

  setMainHTML(`
    <div class="m3-fortschritt">
      <span><span class="m3-teil-badge">Teil 1 von 2</span>Karte ${t1.index + 1} von ${gesamt}</span>
      <span class="m3-runde-info">✅ ${t1.richtig.ja + t1.richtig.nein} richtig einsortiert</span>
    </div>
    <div class="m3-karte">
      <div class="m3-titel">Ist das ein Laplace-Experiment?</div>
      <div class="m3-beschreibung">Ein Laplace-Experiment nennt man <strong>fair</strong>: Alle möglichen Ergebnisse müssen gleich wahrscheinlich sein. Lies dir jede Situation durch und ordne sie ein.</div>

      <div class="m3-karten-stapel">${kartenSlotHtml}</div>

      ${unterKarteHtml}
    </div>
  `);
}

function einordnenT1(kat) {
  if (t1.sperre) return;
  t1.sperre = true;
  const karte = t1.reihenfolge[t1.index];
  const aktiveKarte = document.getElementById('aktiveKarte');
  const istRichtig = karte.kat === kat;
  if (istRichtig) t1.richtig[kat]++;

  if (aktiveKarte) aktiveKarte.classList.add(kat === 'ja' ? 'swipe-right' : 'swipe-left');

  setTimeout(() => {
    t1.antwort = {
      richtig: istRichtig,
      hinweis: karte.kat === 'ja' ? 'Eigentlich: Laplace-Experiment' : 'Eigentlich: kein Laplace-Experiment',
    };
    t1.sperre = false;
    renderTeil1();
  }, 350);
}

function naechsteKarteT1() {
  t1.index++;
  t1.antwort = null;
  renderTeil1();
}

/* ═══════════════════════ Übergang: Merksatz + Formel ═══════════════════════ */
function zeigeUebergangZuMerksatz() {
  setMainHTML(`
    <div class="m3-karte m3-transition">
      <div class="m3-transition-emoji">⚖️</div>
      <div class="m3-transition-titel">Was macht ein Experiment "fair"?</div>
      <p class="m3-transition-text">Du hast gerade gespürt, worauf es ankommt: nicht die Anzahl der Ergebnisse zählt, sondern ob sie <strong>gleich wahrscheinlich</strong> sind.</p>

      <div class="m3-merksatz-box">
        <div class="m3-merksatz-label">Merksatz</div>
        <p>Ein Zufallsexperiment heißt <strong>Laplace-Experiment</strong> (oder: es ist <strong>fair</strong>), wenn alle möglichen Ergebnisse die gleiche Wahrscheinlichkeit haben.</p>
        <p>Nur dann darfst du eine gesuchte Wahrscheinlichkeit so berechnen:</p>
        <div class="m3-formel-box">

      <button class="btn btn-orange" onclick="starteTeil2()">Los geht's →</button>
    </div>
  `);
}

/* ═══════════════════════ Teil 2: Ergebnisse zu Ereignissen zählen ═══════════════════════
   9 Experimente im Pool, jedes mit mehreren möglichen Ereignis-Fragen (Vielfache, kleiner/
   größer als, zwischen ... und ...). Pro Durchlauf werden 6 Experimente zufällig ausgewählt
   UND pro Experiment eine zufällige Ereignis-Variante gezogen — so wiederholt sich nicht
   immer dieselbe Frage zum selben Experiment. */

      { titel: 'Zahl kleiner als 3', kurzlabel: 'eine Zahl kleiner als 3', test: n => n < 3 },
      { titel: 'Zahl zwischen 2 und 5', kurzlabel: 'eine Zahl zwischen 2 und 5', test: n => n >= 2 && n <= 5 },

  {

    intro: 'Ein faires Glücksrad hat 8 gleich große Felder, nummeriert von 1 bis 8.', numerisch: true,
    ergebnisseBasis: [1,2,3,4,5,6,7,8].map(n => ({ label: String(n), symbol: RAD_8 })),
    varianten: [

      { titel: 'Gerade Zahl', kurzlabel: 'eine gerade Zahl', test: n => n % 2 === 0 },
      { titel: 'Zahl höchstens 5', kurzlabel: 'eine Zahl höchstens 5', test: n => n <= 5 },
      { titel: 'Zahl zwischen 3 und 6', kurzlabel: 'eine Zahl zwischen 3 und 6', test: n => n >= 3 && n <= 6 },
    ],
  },
  {
    experiment: `<span style="display:inline-flex;align-items:center;gap:.35rem;vertical-align:middle;">${URNE_KLEIN} Kugelbeutel (10 Kugeln)</span>`,
    intro: 'Ein Beutel enthält 10 gleich große Kugeln: 4 rote, 3 blaue, 3 gelbe. Du ziehst blind eine Kugel.', numerisch: false,
    ergebnisseBasis: [
      ...Array(4).fill().map(() => ({ label: 'rot', symbol: '🔴' })),
      ...Array(3).fill().map(() => ({ label: 'blau', symbol: '🔵' })),
      ...Array(3).fill().map(() => ({ label: 'gelb', symbol: '🟡' })),
    ],
    varianten: [
      { titel: 'Rote Kugel ziehen', kurzlabel: 'eine rote Kugel', test: l => l === 'rot' },
      { titel: 'Blaue Kugel ziehen', kurzlabel: 'eine blaue Kugel', test: l => l === 'blau' },
      { titel: 'Keine rote Kugel', kurzlabel: 'keine rote Kugel', test: l => l !== 'rot' },
      { titel: 'Gelbe oder rote Kugel', kurzlabel: 'eine gelbe oder rote Kugel', test: l => l === 'gelb' || l === 'rot' },
    ],
  },
  {
    experiment: '🃏 Kartenfarbe', intro: 'Du ziehst blind eine Karte und schaust nur auf die Farbe.', numerisch: false,
    ergebnisseBasis: [
      { label: 'Kreuz', symbol: '♣' }, { label: 'Pik', symbol: '♠' },
      { label: 'Herz', symbol: '♥' }, { label: 'Karo', symbol: '♦' },
    ],
    varianten: [
      { titel: 'Rote Farbe ziehen', kurzlabel: 'eine rote Farbe (Herz oder Karo)', test: l => l === 'Herz' || l === 'Karo' },
      { titel: 'Schwarze Farbe ziehen', kurzlabel: 'eine schwarze Farbe (Kreuz oder Pik)', test: l => l === 'Kreuz' || l === 'Pik' },
      { titel: 'Kreuz ziehen', kurzlabel: 'ein Kreuz', test: l => l === 'Kreuz' },
      { titel: 'Nicht Karo ziehen', kurzlabel: 'keine Karo-Karte', test: l => l !== 'Karo' },
    ],
  },
  {
    experiment: `<span style="display:inline-flex;align-items:center;gap:.35rem;vertical-align:middle;">${RAD_12_KLEIN} Glücksrad (12 gleich große Felder)</span>`,
    intro: 'Ein faires Glücksrad hat 12 gleich große Felder, nummeriert von 1 bis 12.', numerisch: true,
    ergebnisseBasis: Array.from({length:12}, (_, i) => i+1).map(n => ({ label: String(n), symbol: RAD_12 })),
    varianten: [
      { titel: 'Vielfaches von 3', kurzlabel: 'ein Vielfaches von 3', test: n => n % 3 === 0 },
      { titel: 'Gerade Zahl', kurzlabel: 'eine gerade Zahl', test: n => n % 2 === 0 },
      { titel: 'Zahl höchstens 4', kurzlabel: 'eine Zahl höchstens 4', test: n => n <= 4 },
      { titel: 'Zahl zwischen 5 und 9', kurzlabel: 'eine Zahl zwischen 5 und 9', test: n => n >= 5 && n <= 9 },
    ],
  },
  {

    ergebnisseBasis: [
      ...Array(3).fill().map(() => ({ label: 'Gewinn', symbol: '🎉' })),
      ...Array(12).fill().map(() => ({ label: 'Niete', symbol: '⬜' })),
    ],
    varianten: [
      { titel: 'Ein Gewinn-Los ziehen', kurzlabel: 'ein Gewinn-Los', test: l => l === 'Gewinn' },
      { titel: 'Eine Niete ziehen', kurzlabel: 'eine Niete', test: l => l === 'Niete' },
    ],
  },
  {
    experiment: `<span style="display:inline-flex;align-items:center;gap:.35rem;vertical-align:middle;">${D10_KLEIN} Zehnseitiger Würfel</span>`,
    intro: 'Ein fairer zehnseitiger Würfel zeigt die Zahlen 1 bis 10.', numerisch: true,
    ergebnisseBasis: Array.from({length:10}, (_, i) => i+1).map(n => ({ label: String(n), symbol: svgZahlWuerfel(n, 40) })),
    varianten: [
      { titel: 'Zahl mindestens 7', kurzlabel: 'eine Zahl mindestens 7', test: n => n >= 7 },
      { titel: 'Gerade Zahl', kurzlabel: 'eine gerade Zahl', test: n => n % 2 === 0 },
      { titel: 'Zahl kleiner als 4', kurzlabel: 'eine Zahl kleiner als 4', test: n => n < 4 },
      { titel: 'Zahl zwischen 3 und 6', kurzlabel: 'eine Zahl zwischen 3 und 6', test: n => n >= 3 && n <= 6 },
    ],
  },
  {
    experiment: '🏺 Kugelbeutel (12 Kugeln)', intro: 'Ein Beutel enthält 12 gleich große Kugeln: 5 grüne, 4 gelbe, 3 lila. Du ziehst blind eine Kugel.', numerisch: false,
    ergebnisseBasis: [
      ...Array(5).fill().map(() => ({ label: 'grün', symbol: '🟢' })),

      ...Array(3).fill().map(() => ({ label: 'lila', symbol: '🟣' })),
    ],

      { titel: 'Keine lila Kugel', kurzlabel: 'keine lila Kugel', test: l => l !== 'lila' },

    ],
  },
  {
    experiment: '🎫 Zahlenlose (1–20)', intro: 'In einer Box liegen 20 gleich gefaltete Lose, nummeriert von 1 bis 20.', numerisch: true,
    ergebnisseBasis: Array.from({length:20}, (_, i) => i+1).map(n => ({ label: String(n), symbol: '🎫' })),
    varianten: [
      { titel: 'Durch 4 teilbare Zahl', kurzlabel: 'eine durch 4 teilbare Zahl', test: n => n % 4 === 0 },
      { titel: 'Durch 5 teilbare Zahl', kurzlabel: 'eine durch 5 teilbare Zahl', test: n => n % 5 === 0 },
      { titel: 'Zahl höchstens 6', kurzlabel: 'eine Zahl höchstens 6', test: n => n <= 6 },
      { titel: 'Zahl zwischen 8 und 13', kurzlabel: 'eine Zahl zwischen 8 und 13', test: n => n >= 8 && n <= 13 },
    ],
  },
];

let TEIL2_RUNDEN = [];
function baueRundeAusExperiment(exp) {
  const variante = exp.varianten[Math.floor(Math.random() * exp.varianten.length)];
  const testFn = exp.numerisch ? (label => variante.test(Number(label))) : (label => variante.test(label));
  return {
    experiment: exp.experiment,
    titel: variante.titel,
    kurzlabel: variante.kurzlabel,
    ereignis: `${exp.intro} Wie groß ist die Wahrscheinlichkeit für <span>${variante.kurzlabel}</span>?`,
    ergebnisse: exp.ergebnisseBasis.map(e => ({ ...e, guenstig: testFn(e.label) })),
  };
}
function baueTeil2Runden() {
  TEIL2_RUNDEN = shuffle(TEIL2_POOL).slice(0, 6).map(baueRundeAusExperiment);
}

let rIndex2 = 0;
let t2 = { ausgewaehlt: new Set(), geprueft: null };

function starteTeil2() {
  rIndex2 = 0;
  baueTeil2Runden();
  starteRundeT2();
}

function starteRundeT2() {
  t2 = { ausgewaehlt: new Set(), geprueft: null };
  renderTeil2();
}

function outcomeToggle(i) {
  if (t2.geprueft && t2.geprueft.alleRichtig) return;
  if (t2.ausgewaehlt.has(i)) t2.ausgewaehlt.delete(i); else t2.ausgewaehlt.add(i);
  t2.geprueft = null;
  renderTeil2();
}

function outcomeTileClass(runde, i) {
  if (!t2.geprueft) return t2.ausgewaehlt.has(i) ? 'gewaehlt' : '';
  const istGuenstig = runde.ergebnisse[i].guenstig;
  const gewaehlt = t2.ausgewaehlt.has(i);
  const gesperrt = t2.geprueft.alleRichtig ? ' gesperrt' : '';
  if (istGuenstig && gewaehlt) return 'richtig' + gesperrt;
  if (!istGuenstig && gewaehlt) return 'falsch-plus' + gesperrt;
  if (istGuenstig && !gewaehlt) return 'falsch-minus' + gesperrt;
  return gesperrt.trim();
}

function pruefenT2() {
  const runde = TEIL2_RUNDEN[rIndex2];
  const guenstigeGesamt = runde.ergebnisse.filter(e => e.guenstig).length;
  const moeglich = runde.ergebnisse.length;
  const ausgewaehltRichtig = [...t2.ausgewaehlt].every(i => runde.ergebnisse[i].guenstig) && t2.ausgewaehlt.size === guenstigeGesamt;
  t2.geprueft = { alleRichtig: ausgewaehltRichtig, guenstige: guenstigeGesamt, moeglich, kurzlabel: runde.kurzlabel };
  renderTeil2();
}

function renderTeil2() {
  const runde = TEIL2_RUNDEN[rIndex2];

  const tilesHtml = runde.ergebnisse.map((e, i) => `
    <div class="m3-outcome-tile ${outcomeTileClass(runde, i)}" onclick="outcomeToggle(${i})">
      <div>${e.symbol}</div>
      <div class="lbl">${e.label}</div>
    </div>
  `).join('');

  let ergebnisBoxHtml = '';
  if (t2.geprueft && t2.geprueft.alleRichtig) {
    const [zk, nk] = kuerze(t2.geprueft.guenstige, t2.geprueft.moeglich);
    const gekuerzt = (zk !== t2.geprueft.guenstige || nk !== t2.geprueft.moeglich);
    const prozent = Math.round((zk / nk) * 1000) / 10;
    ergebnisBoxHtml = `
      <div class="m3-ergebnis-box">
        <div class="m3-ergebnis-rechnung">
          P(${t2.geprueft.kurzlabel}) = ${bruchHTML(t2.geprueft.guenstige, t2.geprueft.moeglich, true)}
          ${gekuerzt ? `&nbsp;=&nbsp; ${bruchHTML(zk, nk, true)}` : ''}
        </div>
        <div class="m3-ergebnis-prozent">Das entspricht ${prozent}\u00A0%.</div>
      </div>
    `;
  }

  const info = !t2.geprueft ? ''
    : (t2.geprueft.alleRichtig ? '🎉 Richtig gezählt!' : 'Noch nicht ganz — grün = richtig, rot ausgefüllt = falsch dazugezählt, rot gestrichelt = vergessen. Korrigiere per Klick.');

  setMainHTML(`
    <div class="m3-fortschritt">
      <span><span class="m3-teil-badge">Teil 2 von 2</span>Runde ${rIndex2 + 1} von ${TEIL2_RUNDEN.length}</span>
      <span class="m3-runde-info">${t2.ausgewaehlt.size} ausgewählt</span>
    </div>
    <div class="m3-karte">
      <div class="m3-experiment-row"><span class="m3-experiment-badge">${runde.experiment}</span></div>
      <div class="m3-ereignis-frage">${runde.ereignis}</div>

      <div class="m3-outcome-grid">${tilesHtml}</div>

      <div class="m3-zaehl-row">
        <span class="m3-zaehl-counter">Ausgewählt: <strong>${t2.ausgewaehlt.size}</strong> von ${runde.ergebnisse.length} möglichen Ergebnissen</span>
      </div>

      ${ergebnisBoxHtml}

      <div class="m3-pruef-row">
        ${!t2.geprueft || !t2.geprueft.alleRichtig ? `<button class="btn btn-orange" onclick="pruefenT2()">✓ Prüfen</button>` : ''}
        <span class="m3-pruef-info ${t2.geprueft && t2.geprueft.alleRichtig ? 'richtig' : (t2.geprueft ? 'falsch' : '')}">${info}</span>
        ${t2.geprueft && t2.geprueft.alleRichtig ? `<button class="btn btn-yellow" onclick="naechsteRundeT2()">${rIndex2 < TEIL2_RUNDEN.length - 1 ? 'Weiter →' : 'Zur Auswertung →'}</button>` : ''}
      </div>
    </div>
  `);
}

function naechsteRundeT2() {
  rIndex2++;
  if (rIndex2 >= TEIL2_RUNDEN.length) { zeigeEnde(); return; }
  starteRundeT2();
}

/* ═══════════════════════ Ende ═══════════════════════ */
function zeigeEnde() {
  setMainHTML(`
    <div class="m3-karte m3-ende">
      <div class="m3-ende-emoji">⚖️</div>
      <div class="m3-ende-titel">Aus Struktur wird eine Zahl!</div>
      <p class="m3-ende-merksatz">Merksatz: Bei einem Laplace-Experiment (alle Ergebnisse gleich wahrscheinlich) kannst du jede gesuchte Wahrscheinlichkeit als Verhältnis berechnen: Anzahl der günstigen Ergebnisse durch Anzahl der möglichen Ergebnisse. Wichtig bleibt: Diese Formel funktioniert nur, wenn das Experiment wirklich fair ist — sonst musst du die Wahrscheinlichkeiten einzeln kennen. Als Nächstes (Modul 4) schauen wir uns an, was passiert, wenn man ein Experiment sehr oft wiederholt: Trifft die berechnete Wahrscheinlichkeit dann auch ungefähr zu?</p>
      <div style="display:flex;flex-direction:column;align-items:center;gap:.7rem;">
        <button class="btn btn-orange" onclick="location.href='../modul4/index.html'">🔮 Weiter zu Modul 4 →</button>
        <button class="btn btn-mint" onclick="starteAlles()">🔄 Nochmal von vorne</button>
      </div>
    </div>
  `);
}

function starteAlles() {
  zeigeIntro();
}

starteAlles();
