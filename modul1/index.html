  let dots = '';
  for (let i = 0; i < 9; i++) dots += `<div class="die-dot" id="${id}_${i}"></div>`;
  return dots;
}
function setDieFaceEl(id, value) {
  const pattern = DOT_PATTERNS[value] || [];

    const dot = document.getElementById(`${id}_${i}`);

/* ── Stufe 2: jedes Experiment mit sich selbst kombiniert ── */
function kombiniereErgebnisse(basisErgebnisse) {
  const kombis = [];
  basisErgebnisse.forEach(a => {
    basisErgebnisse.forEach(b => {
      kombis.push({ label: `${a.label} + ${b.label}`, a, b, gewicht: a.gewicht * b.gewicht });
    });
  });
  return kombis;
}
function macheKombiniert(basis) {
  return {
    id: basis.id + '_x2', typ: 'kombiniert', basisTyp: basis.typ,
    titel: `2× ${basis.titel}`,
    ziehenLabel: `${basis.ziehenLabel} (2×)`,
    beschreibung: `Jetzt kombinieren wir: Du führst "${basis.titel}" zweimal hintereinander aus. Das Ergebnis ist die Kombination aus beiden Durchgängen.`,
    basisErgebnisse: basis.ergebnisse,
    ergebnisse: kombiniereErgebnisse(basis.ergebnisse),
  };
}

const ALLE_RUNDEN = [
  ...BASIS_EXPERIMENTE.map(e => ({ ...e, stufe: 1 })),
  ...BASIS_EXPERIMENTE.map(e => ({ ...macheKombiniert(e), stufe: 2 })),
];

const MIN_ZIEHUNGEN_VOR_SCHAETZUNG = 3;

/* ── Zufalls-Helfer ── */
function ziehen(ergebnisse) {
  const summe = ergebnisse.reduce((s,e) => s + e.gewicht, 0);
  let r = Math.random() * summe;
  for (const e of ergebnisse) {
    if (r < e.gewicht) return e;
    r -= e.gewicht;
  }
  return ergebnisse[ergebnisse.length - 1];
}

/* ── Spielzustand ── */

let richtigeSchaetzungen = 0;

    return `
      <div class="m1-lootbox-wrap" id="m1LootWrap${suffix}">
        <div class="m1-lootbox-glow" id="m1LootGlow${suffix}"></div>
        <div class="m1-lootbox" id="m1LootIcon${suffix}">📦</div>
      </div>`;
  }
  if (typ === 'slot') {
    return `
      <div class="m1-slot-frame">
        <div class="m1-slot-lights"><span></span><span></span><span></span><span></span></div>
        <div class="m1-slot-window"><div class="m1-slot-symbol" id="m1SlotSymbol${suffix}">❔</div></div>
      </div>`;
  }
  return '';
}

function buehneHTML(exp) {
  if (exp.typ !== 'kombiniert') return buehneTeilHTML(exp.typ, '');
  return `
    <div class="m1-kombi-row">
      <div>${buehneTeilHTML(exp.basisTyp, 'A')}<div class="m1-kombi-label">1. Durchgang</div></div>
      <span class="m1-kombi-plus">+</span>
      <div>${buehneTeilHTML(exp.basisTyp, 'B')}<div class="m1-kombi-label">2. Durchgang</div></div>
    </div>`;
}

function cardInnerHTML(ergebnis) {
  if (!ergebnis) return `<span class="m1-card-symbol" style="color:var(--muted)">?</span>`;
  return `
    <span class="m1-card-corner tl" style="color:${ergebnis.farbe}">${ergebnis.symbol}</span>
    <span class="m1-card-symbol" style="color:${ergebnis.farbe}">${ergebnis.symbol}</span>
    <span class="m1-card-corner br" style="color:${ergebnis.farbe}">${ergebnis.symbol}</span>`;
}

function ruhezustandTeil(typ, suffix, teilErgebnis) {
  if (!teilErgebnis) { if (typ === 'wuerfel') setDieFaceEl('m1Die' + suffix, 1); return; }
  if (typ === 'muenze') {
    const inner = document.getElementById('m1CoinInner' + suffix);
    if (inner) inner.style.transform = teilErgebnis.label === 'Kopf' ? 'rotateY(0deg)' : 'rotateY(180deg)';
  } else if (typ === 'wuerfel') {
    setDieFaceEl('m1Die' + suffix, Number(teilErgebnis.label));
  } else if (typ === 'karte') {
    const card = document.getElementById('m1Card' + suffix);
    if (card) card.innerHTML = cardInnerHTML(teilErgebnis);
  } else if (typ === 'lootbox') {
    const glow = document.getElementById('m1LootGlow' + suffix);
    if (glow) { glow.style.setProperty('--glow', teilErgebnis.farbe); glow.classList.add('aktiv'); }
  } else if (typ === 'slot') {
    const sym = document.getElementById('m1SlotSymbol' + suffix);
    if (sym) sym.textContent = teilErgebnis.symbol;
  }
}

function buehneAufRuhezustandSetzen(exp, letzterZug) {
  if (exp.typ !== 'kombiniert') {
    ruhezustandTeil(exp.typ, '', letzterZug);
  } else {
    ruhezustandTeil(exp.basisTyp, 'A', letzterZug ? letzterZug.a : null);
    ruhezustandTeil(exp.basisTyp, 'B', letzterZug ? letzterZug.b : null);
  }
}

/* Spielt die Zieh-Animation für EIN Teilergebnis ab und meldet sich per fertig() zurück */
function spieleAnimationTeil(typ, suffix, zielErgebnis, fertig) {
  if (typ === 'muenze') {
    const inner = document.getElementById('m1CoinInner' + suffix);
    inner.classList.remove('flipping'); void inner.offsetWidth; inner.classList.add('flipping');
    const extraSpins = zielErgebnis.label === 'Kopf' ? 1800 : 1980;
    inner.style.transform = `rotateY(${extraSpins}deg)`;
    setTimeout(() => { inner.classList.remove('flipping'); fertig(); }, 1200);

  } else if (typ === 'wuerfel') {
    const die = document.getElementById('m1Die' + suffix);
    die.classList.remove('rolling'); void die.offsetWidth; die.classList.add('rolling');
    const iv = setInterval(() => setDieFaceEl('m1Die' + suffix, 1 + Math.floor(Math.random()*6)), 70);
    setTimeout(() => {
      clearInterval(iv);
      die.classList.remove('rolling');
      setDieFaceEl('m1Die' + suffix, Number(zielErgebnis.label));
      fertig();
    }, 600);

  } else if (typ === 'karte') {
    const card = document.getElementById('m1Card' + suffix);
    card.classList.add('flip');
    setTimeout(() => {
      card.innerHTML = cardInnerHTML(zielErgebnis);
      card.classList.remove('flip');
      fertig();
    }, 320);

  } else if (typ === 'lootbox') {
    const wrap = document.getElementById('m1LootWrap' + suffix);
    const glow = document.getElementById('m1LootGlow' + suffix);
    wrap.classList.remove('shake'); void wrap.offsetWidth; wrap.classList.add('shake');
    setTimeout(() => {
      wrap.classList.remove('shake');
      glow.style.setProperty('--glow', zielErgebnis.farbe);
      glow.classList.add('aktiv');
      fertig();
    }, 500);

  } else if (typ === 'slot') {
    const basis = BASIS_EXPERIMENTE.find(e => e.typ === 'slot');
    const sym = document.getElementById('m1SlotSymbol' + suffix);
    sym.classList.add('spinning');
    const iv = setInterval(() => {
      sym.textContent = basis.ergebnisse[Math.floor(Math.random()*basis.ergebnisse.length)].symbol;
    }, 70);
    setTimeout(() => {
      clearInterval(iv);
      sym.classList.remove('spinning');
      sym.textContent = zielErgebnis.symbol;
      fertig();
    }, 550);
  }
}

function spieleAnimation(exp, fertig) {
  const ergebnis = ziehen(exp.ergebnisse);
  if (exp.typ !== 'kombiniert') {
    spieleAnimationTeil(exp.typ, '', ergebnis, () => fertig(ergebnis));
    return;
  }
  let fertigCount = 0;
  const onTeilFertig = () => { fertigCount++; if (fertigCount === 2) fertig(ergebnis); };
  spieleAnimationTeil(exp.basisTyp, 'A', ergebnis.a, onTeilFertig);
  spieleAnimationTeil(exp.basisTyp, 'B', ergebnis.b, onTeilFertig);
}

function ziehenKlick() {
  if (amZiehen) return;
  amZiehen = true;
  const btn = document.getElementById('ziehenBtn');
  if (btn) btn.disabled = true;
  const exp = ALLE_RUNDEN[expIndex];
  spieleAnimation(exp, (ergebnis) => {
    gezogen.push(ergebnis);
    const bisher = gesehen.get(ergebnis.label);
    if (bisher) bisher.anzahl++;
    else gesehen.set(ergebnis.label, { anzahl: 1 });
    amZiehen = false;
    render();
  });
}

function pruefeSchaetzung() {
  const input = document.getElementById('schaetzInput');
  if (input.value === '') return;
  const exp = ALLE_RUNDEN[expIndex];
  const schaetzung = Number(input.value);
  const richtig = schaetzung === exp.ergebnisse.length;
  if (richtig) richtigeSchaetzungen++;
  phase = 'aufgedeckt';
  render(richtig);
}

function naechsteRunde() {
  const alteStufe = ALLE_RUNDEN[expIndex].stufe;
  expIndex++;
  if (expIndex >= ALLE_RUNDEN.length) { zeigeEnde(); return; }
  if (ALLE_RUNDEN[expIndex].stufe !== alteStufe) { zeigeStufenwechsel(); return; }
  starteExperiment();
}

/* ── Rendering ── */
function render(letzteSchaetzungRichtig) {
  const exp = ALLE_RUNDEN[expIndex];
  const el = document.getElementById('mainArea');
  const letzterZug = gezogen[gezogen.length - 1];

  const chipsHtml = gezogen.length === 0
    ? '<span style="color:var(--muted);font-size:.9rem">Noch nichts gezogen …</span>'
    : [...gesehen.entries()].map(([label, info]) =>
        `<span class="m1-chip">${label} <span class="anzahl">×${info.anzahl}</span></span>`
      ).join('');

  let schaetzenHtml = '';
  if (phase === 'sammeln' && gezogen.length >= MIN_ZIEHUNGEN_VOR_SCHAETZUNG) {
    schaetzenHtml = `
      <div class="m1-schaetzen">
        <div class="m1-schaetzen-frage">Wie viele verschiedene Ergebnisse gibt es insgesamt bei diesem Experiment?</div>
        <div class="m1-eingabe-row">
          <input type="number" id="schaetzInput" min="0" placeholder="?">
          <button class="btn btn-orange" onclick="pruefeSchaetzung()">Aufdecken</button>
        </div>
      </div>`;
  } else if (phase === 'sammeln') {
    const restl = MIN_ZIEHUNGEN_VOR_SCHAETZUNG - gezogen.length;
    schaetzenHtml = `<div class="m1-schaetzen"><span style="color:var(--muted);font-size:.88rem">Zieh noch ${restl}× , dann kannst du schätzen.</span></div>`;
  }

  let aufgedecktHtml = '';
  if (phase === 'aufgedeckt') {
    const gesehenLabels = new Set(gesehen.keys());
    const nichtGesehenAnzahl = exp.ergebnisse.filter(e => !gesehenLabels.has(e.label)).length;
    const ergebnisraumHtml = exp.typ === 'kombiniert'
      ? renderErgebnisraumGrid(exp, gesehenLabels)
      : `<div class="m1-er-liste">${exp.ergebnisse.map(e => `<span class="m1-er-item ${!gesehenLabels.has(e.label)?'neu':''}">${e.symbol} ${e.label}</span>`).join('')}</div>`;

    aufgedecktHtml = `
      <div class="m1-feedback ${letzteSchaetzungRichtig ? 'richtig' : 'falsch'}">
        ${letzteSchaetzungRichtig ? '✅ Richtig geschätzt!' : '❌ Nicht ganz.'} Es gibt genau <strong>${exp.ergebnisse.length}</strong> mögliche Ergebnisse.
      </div>
      <div class="m1-ergebnisraum">
        <div class="m1-ergebnisraum-titel">Der vollständige Ergebnisraum</div>
        ${ergebnisraumHtml}
        ${nichtGesehenAnzahl > 0 ? `<div class="m1-hinweis-neu">🟡 markiert: ${nichtGesehenAnzahl} Ergebnis${nichtGesehenAnzahl>1?'se':''}, den/die du beim Ziehen noch gar nicht gesehen hattest — obwohl er/sie die ganze Zeit möglich war!</div>` : ''}
      </div>
    `;
  }

  const stufenLabel = exp.stufe === 1 ? 'Stufe 1' : 'Stufe 2';
  const nummerInStufe = (expIndex % BASIS_EXPERIMENTE.length) + 1;

  el.innerHTML = `
    <div class="m1-fortschritt">
      <span><span class="m1-stufe-badge">${stufenLabel}</span>Experiment ${nummerInStufe} von ${BASIS_EXPERIMENTE.length}</span>
      <span class="m1-punkte">★ ${richtigeSchaetzungen} richtige Schätzung${richtigeSchaetzungen===1?'':'en'}</span>
    </div>
    <div class="m1-karte">
      <div class="m1-titel">${exp.titel}</div>
      <div class="m1-beschreibung">${exp.beschreibung}</div>
      <div class="m1-inhalt ${exp.typ === 'kombiniert' ? 'kombi' : ''}">
        <div class="m1-buehne">
          ${buehneHTML(exp)}
          <div class="m1-ergebnis-label">${letzterZug ? letzterZug.label : 'Noch kein Zug'}</div>
          ${phase === 'sammeln' ? `<button class="btn btn-mint m1-ziehen-btn" id="ziehenBtn" onclick="ziehenKlick()">${exp.ziehenLabel}</button>` : ''}
        </div>
        <div class="m1-rechts">
          <div class="m1-gesammelt-titel">Bisher gesehen (${gezogen.length}× gezogen)</div>
          <div class="m1-chips">${chipsHtml}</div>
          ${schaetzenHtml}
          ${aufgedecktHtml}
        </div>
      </div>
      ${(phase === 'aufgedeckt' && exp.kritisch) ? renderKritisch(exp.kritisch) : ''}
      ${phase === 'aufgedeckt' ? `
        <div class="m1-weiter-row">
          <button class="btn btn-yellow" onclick="naechsteRunde()">
            ${expIndex < ALLE_RUNDEN.length - 1 ? 'Weiter →' : 'Zur Auswertung →'}
          </button>
        </div>` : ''}
    </div>
  `;

  buehneAufRuhezustandSetzen(exp, letzterZug);

  if (phase === 'sammeln' && gezogen.length >= MIN_ZIEHUNGEN_VOR_SCHAETZUNG) {
    const inp = document.getElementById('schaetzInput');
    if (inp) inp.addEventListener('keydown', (e) => { if (e.key === 'Enter') pruefeSchaetzung(); });
  }
}

function renderErgebnisraumGrid(exp, gesehenLabels) {
  const basis = exp.basisErgebnisse;
  let html = '<div class="m1-er-grid-achsen">Zeilen = <strong>1. Durchgang</strong> · Spalten = <strong>2. Durchgang</strong></div>';
  html += '<div class="m1-er-grid-wrap"><table class="m1-er-grid"><tr><th></th>' +
    basis.map(b => `<th>${b.symbol}</th>`).join('') + '</tr>';
  basis.forEach(rowA => {
    html += `<tr><th>${rowA.symbol}</th>`;
    basis.forEach(colB => {
      const label = `${rowA.label} + ${colB.label}`;
      const neu = !gesehenLabels.has(label);
      html += `<td class="${neu ? 'neu' : ''}" title="${label}"><div class="m1-grid-zelle"><span>${rowA.symbol}</span><span>${colB.symbol}</span></div></td>`;
    });
    html += '</tr>';
  });
  html += '</table></div>';
  return html;
}

function renderKritisch(k) {
  return `
    <div class="m1-kritisch">
      <div class="m1-kritisch-titel">${k.titel}</div>
      ${k.text.map(p => `<p>${p}</p>`).join('')}
      <ul>${k.punkte.map(p => `<li>${p}</li>`).join('')}</ul>
      <div class="m1-kritisch-fragen">
        ${k.fragen.map(f => `<div>💬 ${f}</div>`).join('')}
      </div>
    </div>
  `;
}

function zeigeStufenwechsel() {
  document.getElementById('mainArea').innerHTML = `
    <div class="m1-karte m1-transition">
      <div class="m1-transition-emoji">🔗</div>
      <div class="m1-transition-titel">Stufe 1 geschafft! Weiter mit Stufe 2</div>
      <p class="m1-transition-text">
        Jetzt kombinieren wir jedes Experiment <strong>mit sich selbst</strong>: Du ziehst z.&nbsp;B. zweimal hintereinander eine Münze,
        und das Ergebnis ist die <em>Kombination</em> aus beiden Würfen (z.&nbsp;B. "Kopf + Zahl").
        Schätze wieder: Wie viele verschiedene Kombinationen gibt es dann wohl?
      </p>
      <button class="btn btn-orange" onclick="starteExperiment()">Los geht's mit Stufe 2 →</button>
    </div>
  `;
}

function zeigeEnde() {
  const gesamt = ALLE_RUNDEN.length;
  const quote = richtigeSchaetzungen / gesamt;
  const emoji = quote >= 0.8 ? '🏆' : quote >= 0.5 ? '🎉' : '🔍';
  const spruch = quote >= 0.8 ? 'Ergebnisräume sind dein Ding!' : quote >= 0.5 ? 'Guter Blick fürs Ganze!' : 'Genau hinschauen lohnt sich!';

  document.getElementById('mainArea').innerHTML = `
    <div class="m1-karte m1-ende">
      <div class="m1-ende-emoji">${emoji}</div>
      <div class="m1-ende-titel">${spruch}</div>
      <div class="m1-ende-score">Du hast <strong>${richtigeSchaetzungen} von ${gesamt}</strong> Ergebnisräumen richtig geschätzt.</div>
      <p class="m1-ende-merksatz">Merksatz: Der Ergebnisraum beschreibt, was <em>strukturell möglich</em> ist — nicht nur das, was du zufällig schon beobachtet hast. Und: Kombinierst du zwei Experimente, wächst der Ergebnisraum multiplikativ (z.&nbsp;B. 6 × 6 = 36 beim doppelten Würfeln). Genau darauf bauen wir in Modul 2 mit dem Baumdiagramm auf.</p>
      <button class="btn btn-mint" onclick="starteSpiel()">🔄 Nochmal von vorne</button>
    </div>
  `;
}

function starteSpiel() {
  expIndex = 0;
  richtigeSchaetzungen = 0;
  starteExperiment();
}

starteSpiel();
</script>
</body>
</html>
