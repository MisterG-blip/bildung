<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modul 4: Prognose &amp; Experiment — MaLa - Das Mathematik Labor</title>
<link rel="stylesheet" href="../styles/base.css">
<link rel="stylesheet" href="../styles/spielecke.css">
<style>
body { background: radial-gradient(ellipse at 30% 10%, #3a2410 0%, #1a1f3a 55%); }

.m4-header {
  background: linear-gradient(135deg, #1a1f3a 0%, #4a2e1a 100%);
  border-bottom: 3px solid rgba(255,122,71,0.35);
  padding: 1rem 1.5rem;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: .75rem;
  position: sticky; top: 0; z-index: 50;
}
.m4-logo { font-size: var(--fs-lg); color: var(--orange); letter-spacing: .05em; }
.m4-logo span { color: var(--muted); font-size: var(--fs-xs); font-family: 'Nunito', sans-serif; font-weight: 600; margin-left: .4rem; }

.m4-hero { text-align: center; padding: 2rem 1.5rem 1rem; max-width: 700px; margin: 0 auto; }
.m4-hero h1 { font-size: clamp(1.6rem,4.5vw,2.4rem); color: var(--orange); margin-bottom: .5rem; }
.m4-hero p  { font-size: var(--fs-sm); color: var(--muted); line-height: 1.7; }

.m4-main { max-width: 880px; margin: 0 auto; padding: 0 1.2rem 4rem; }

.m4-fortschritt {
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: .6rem;
  margin-bottom: 1.2rem; padding: .7rem 1rem;
  background: var(--card-bg); border-radius: 14px; border: 2px solid rgba(255,255,255,0.08);
  font-size: var(--fs-xs);
}
.m4-runde-badge {
  background: rgba(255,122,71,0.15); color: var(--orange); font-weight: 800;
  border-radius: 20px; padding: .25rem .7rem; margin-right: .6rem; font-size: var(--fs-2xs);
}
.m4-phase-info { color: var(--muted); }

.m4-karte {
  background: var(--card-bg); border-radius: 22px; border: 3px solid rgba(255,122,71,0.25);
  padding: 1.6rem 1.6rem 1.8rem;
}
.m4-titel { font-family:'Fredoka One',cursive; font-size: var(--fs-lg); color: var(--text); margin-bottom: .4rem; text-align: center; }
.m4-beschreibung { font-size: var(--fs-xs); color: var(--muted); line-height: 1.65; margin-bottom: 1.2rem; text-align: center; max-width: 640px; margin-left: auto; margin-right: auto; }

.m4-bruch { display: inline-flex; flex-direction: column; align-items: center; line-height: 1; vertical-align: middle; margin: 0 .15em; }
.m4-bruch .z { border-bottom: 2px solid currentColor; padding: 0 .3em .1em; }
.m4-bruch .n { padding: .1em .3em 0; }
.m4-bruch.gross { font-size: 1.5rem; font-weight: 800; }

/* ══════ Übergang / Merksatz ══════ */
.m4-transition, .m4-ende { text-align: center; padding: 2.2rem 1.5rem; }
.m4-transition-emoji, .m4-ende-emoji { font-size: 3rem; margin-bottom: .8rem; }
.m4-transition-titel, .m4-ende-titel { font-family:'Fredoka One',cursive; font-size: var(--fs-xl); color: var(--orange); margin-bottom: .8rem; }
.m4-transition-text { font-size: var(--fs-sm); color: var(--muted); line-height: 1.7; max-width: 560px; margin: 0 auto 1.3rem; }

.m4-merksatz-box {
  background: rgba(255,211,61,0.08); border: 2px solid rgba(255,211,61,0.3);
  border-radius: 16px; padding: 1.3rem 1.4rem; max-width: 600px; margin: 0 auto 1.4rem; text-align: left;
}
.m4-merksatz-label { font-size: var(--fs-2xs); color: var(--yellow); font-weight: 800; text-transform: uppercase; letter-spacing: .06em; margin-bottom: .5rem; }
.m4-merksatz-box p { font-size: var(--fs-sm); color: var(--text); line-height: 1.65; margin-bottom: .6rem; }
.m4-merksatz-box p:last-child { margin-bottom: 0; }

/* ══════ Experiment-Kopf (Icon + Aufbau) ══════ */
.m4-experiment-badge {
  display: inline-flex; align-items: center; gap: .4rem;
  background: rgba(255,122,71,0.12); border-radius: 20px; padding: .3rem .8rem;
  font-size: var(--fs-xs); font-weight: 800; color: var(--orange); margin: 0 auto .9rem; text-align: center;
}
.m4-experiment-row { text-align: center; margin-bottom: .5rem; }
.m4-objekt-flex { display: flex; align-items: center; justify-content: center; gap: 1.1rem; flex-wrap: wrap; margin-bottom: 1rem; }
.m4-objekt-icon { display: flex; align-items: center; justify-content: center; }
.m4-aufbau-text { font-size: var(--fs-xs); color: var(--muted); line-height: 1.6; max-width: 320px; text-align: left; }
.m4-aufbau-text strong { color: var(--text); }
.m4-legende-row { display: flex; gap: .8rem; flex-wrap: wrap; justify-content: center; margin: .5rem 0 0; }
.m4-legende-item { display: flex; align-items: center; gap: .4rem; font-size: var(--fs-2xs); color: var(--muted); font-weight: 700; }
.m4-legende-dot { width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0; border: 2px solid rgba(0,0,0,0.25); }

.m4-ereignis-frage {
  background: rgba(78,205,196,0.08); border: 2px solid rgba(78,205,196,0.3);
  border-radius: 14px; padding: .9rem 1.1rem; text-align: center; font-size: var(--fs-sm); font-weight: 700;
  color: var(--text); margin-bottom: 1.2rem;
}
.m4-ereignis-frage span { color: var(--mint); }

/* ══════ Vorüberlegung: Eingaben ══════ */
.m4-eingabe-block { max-width: 420px; margin: 0 auto 1rem; }
.m4-eingabe-label { font-size: var(--fs-sm); font-weight: 700; color: var(--text); margin-bottom: .5rem; text-align: center; }
.m4-eingabe-row { display: flex; align-items: center; justify-content: center; gap: .6rem; margin-bottom: 1rem; }
.m4-eingabe-row input[type=number] {
  width: 100px; text-align: center; font-size: var(--fs-md); font-weight: 800;
  background: var(--surface2); color: var(--text); border: 2px solid rgba(255,255,255,0.16);
  border-radius: 12px; padding: .55rem .4rem; font-family: inherit;
}
.m4-eingabe-row input[type=number]:focus { outline: none; border-color: var(--orange); }
.m4-eingabe-suffix { font-size: var(--fs-sm); color: var(--muted); font-weight: 700; }
.m4-weiter-row { text-align: center; margin-top: .5rem; }
.m4-hinweis-klein { font-size: var(--fs-2xs); color: var(--muted); text-align: center; font-style: italic; margin-top: -.4rem; margin-bottom: .8rem; }

/* ══════ Simulation ══════ */
.m4-sim-stage { display: flex; align-items: center; justify-content: center; gap: 1.4rem; flex-wrap: wrap; margin-bottom: 1.1rem; min-height: 78px; }
.m4-letzter-zug { display: flex; flex-direction: column; align-items: center; gap: .3rem; }
.m4-letzter-zug-label { font-size: var(--fs-2xs); color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .05em; }
.m4-letzter-zug-ergebnis { font-size: var(--fs-xs); font-weight: 800; color: var(--text); }
.m4-letzter-zug-ergebnis.treffer { color: var(--mint); }

.m4-zieh-buttons { display: flex; gap: .6rem; justify-content: center; flex-wrap: wrap; margin-bottom: 1.1rem; }
.m4-zieh-buttons .btn { min-width: 90px; }

.m4-stats-row { display: flex; align-items: center; justify-content: center; gap: 1.4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.m4-stat { text-align: center; }
.m4-stat-wert { font-size: var(--fs-lg); font-weight: 800; color: var(--text); font-family: 'Fredoka One', cursive; }
.m4-stat-wert.mint { color: var(--mint); }
.m4-stat-label { font-size: var(--fs-2xs); color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }

.m4-chart-wrap { background: rgba(255,255,255,0.03); border-radius: 16px; padding: .9rem .5rem .6rem; margin-bottom: .9rem; }
.m4-chart-legende { display: flex; gap: 1.1rem; justify-content: center; flex-wrap: wrap; margin-top: .3rem; }
.m4-chart-legende-item { display: flex; align-items: center; gap: .4rem; font-size: var(--fs-2xs); color: var(--muted); font-weight: 700; }
.m4-chart-legende-linie { width: 20px; height: 0; border-top: 3px solid; }
.m4-chart-legende-linie.dashed { border-top-style: dashed; }

.m4-sim-hinweis { font-size: var(--fs-2xs); color: var(--muted); text-align: center; font-style: italic; margin-bottom: .8rem; }

/* ══════ Vergleich ══════ */
.m4-vergleich-tabelle { width: 100%; max-width: 560px; margin: 0 auto 1.2rem; border-collapse: separate; border-spacing: 0 .5rem; }
.m4-vergleich-tabelle td { padding: .75rem .9rem; font-size: var(--fs-sm); }
.m4-vergleich-tabelle tr { background: var(--surface2); }
.m4-vergleich-tabelle td:first-child { border-radius: 12px 0 0 12px; color: var(--muted); font-weight: 700; }
.m4-vergleich-tabelle td:last-child { border-radius: 0 12px 12px 0; text-align: right; font-weight: 800; color: var(--text); font-family: 'Fredoka One', cursive; font-size: var(--fs-md); }
.m4-vergleich-tabelle tr.hervor td:last-child { color: var(--mint); }

.m4-vergleich-fazit {
  background: rgba(78,205,196,0.08); border: 2px solid rgba(78,205,196,0.3); border-radius: 16px;
  padding: 1.1rem 1.3rem; max-width: 560px; margin: 0 auto 1.3rem; text-align: center;
  font-size: var(--fs-sm); color: var(--text); line-height: 1.6;
}
.m4-vergleich-fazit.knifflig { background: rgba(192,132,252,0.08); border-color: rgba(192,132,252,0.3); }

/* ══════ Auswertung am Ende ══════ */
.m4-uebersicht-karte { background: var(--surface2); border-radius: 16px; padding: 1rem 1.2rem; margin-bottom: .8rem; text-align: left; }
.m4-uebersicht-titel { font-size: var(--fs-sm); font-weight: 800; color: var(--orange); margin-bottom: .3rem; }
.m4-uebersicht-zeile { font-size: var(--fs-xs); color: var(--muted); display: flex; justify-content: space-between; gap: .6rem; padding: .15rem 0; }
.m4-uebersicht-zeile strong { color: var(--text); }
</style>

<header class="m4-header">
  <div class="m4-logo">🔮 Modul 4: Prognose &amp; Experiment<span>/ Jahrgang 7 &amp; 8</span></div>
  <button class="btn btn-ghost" onclick="location.href='../jahrgang/Jg78.html'">← Jahrgang 7 &amp; 8</button>
</header>

<div class="m4-hero">
  <h1>Vorhersagen auf die Probe stellen</h1>
  <p>Du schätzt oder berechnest eine Wahrscheinlichkeit — und prüfst dann durch echtes Simulieren, ob die Wirklichkeit das bestätigt.</p>
</div>

<div class="m4-main" id="mainArea"></div>

<script>
/* ═══════════════════════ Hilfsfunktionen ═══════════════════════ */
function setMainHTML(html) {
  const el = document.getElementById('mainArea');
  const y = window.scrollY;
  el.innerHTML = html;
  window.scrollTo(0, y);
  requestAnimationFrame(() => window.scrollTo(0, y));
  return el;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function ggT(a, b) { return b === 0 ? a : ggT(b, a % b); }
function kuerze(z, n) { const g = ggT(z, n) || 1; return [z / g, n / g]; }
function bruchHTML(z, n, gross) {
  return `<span class="m4-bruch${gross ? ' gross' : ''}"><span class="z">${z}</span><span class="n">${n}</span></span>`;
}
function rund1(x) { return Math.round(x * 10) / 10; }
function gewichteteWahl(gewichte) {
  // gewichte: [{key, w}] mit Summe der w = 1 (oder beliebig, wird normiert)
  const summe = gewichte.reduce((s, g) => s + g.w, 0);
  let r = Math.random() * summe;
  for (const g of gewichte) { if (r < g.w) return g.key; r -= g.w; }
  return gewichte[gewichte.length - 1].key;
}

/* ═══════════════════════ SVG-Icons ═══════════════════════ */
function svgKugel(farbe, groesse) {
  return `<svg viewBox="0 0 40 40" width="${groesse}" height="${groesse}" style="display:block;">
    <circle cx="20" cy="20" r="16" fill="${farbe}" stroke="#1a1f3a" stroke-width="2"/>
    <ellipse cx="15" cy="14" rx="5" ry="3.2" fill="rgba(255,255,255,0.35)"/>
  </svg>`;
}
function svgUrneMulti(kugeln, groesse) {
  // kugeln: Array von Farben, wird oben in 2 Reihen als kleine Punkte angedeutet
  const s = groesse / 46;
  const punkte = kugeln.slice(0, 8).map((f, i) => {
    const x = 10 + (i % 4) * 8.5, y = i < 4 ? 8 : 15;
    return `<circle cx="${x}" cy="${y}" r="3.1" fill="${f}" stroke="#1a1f3a" stroke-width="1"/>`;
  }).join('');
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <path d="M8 16 Q1 16 1 22 Q1 27 8 27" fill="none" stroke="#1a1f3a" stroke-width="2"/>
    <path d="M38 16 Q45 16 45 22 Q45 27 38 27" fill="none" stroke="#1a1f3a" stroke-width="2"/>
    <path d="M11 11 C6 17, 6 29, 11 36 C14 40, 32 40, 35 36 C40 29, 40 17, 35 11 Z" fill="#B87355" stroke="#1a1f3a" stroke-width="2"/>
    <ellipse cx="23" cy="11" rx="12" ry="4" fill="#8A5638" stroke="#1a1f3a" stroke-width="2"/>
    ${punkte}
  </svg>`;
}
function svgKartenstapel(groesse) {
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <rect x="10" y="7" width="26" height="34" rx="4" fill="#2e3660" stroke="#1a1f3a" stroke-width="2" transform="rotate(-8 23 24)"/>
    <rect x="10" y="7" width="26" height="34" rx="4" fill="#3a4270" stroke="#1a1f3a" stroke-width="2" transform="rotate(4 23 24)"/>
    <rect x="9" y="6" width="28" height="35" rx="4" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="2.2"/>
    <circle cx="23" cy="23" r="7" fill="none" stroke="#1a1f3a" stroke-width="1.6" opacity="0.35"/>
  </svg>`;
}
function svgKarteGezogen(symbol, farbe, groesse) {
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <rect x="6" y="4" width="34" height="38" rx="5" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="2.2"/>
    <text x="23" y="30" font-size="20" text-anchor="middle" fill="${farbe}">${symbol}</text>
  </svg>`;
}
function sektorPfad(cx, cy, r, start, ende) {
  const x1 = cx + r * Math.cos(start), y1 = cy + r * Math.sin(start);
  const x2 = cx + r * Math.cos(ende),  y2 = cy + r * Math.sin(ende);
  const grossBogen = (ende - start) > Math.PI ? 1 : 0;
  return `M ${cx} ${cy} L ${x1.toFixed(2)} ${y1.toFixed(2)} A ${r} ${r} 0 ${grossBogen} 1 ${x2.toFixed(2)} ${y2.toFixed(2)} Z`;
}
function svgGluecksrad(sektoren, groesse) {
  const r = groesse / 2 - 4, cx = groesse / 2, cy = groesse / 2;
  let winkel = -Math.PI / 2, pfade = '';
  sektoren.forEach(s => {
    const naechster = winkel + s.anteil * Math.PI * 2;
    pfade += `<path d="${sektorPfad(cx, cy, r, winkel, naechster)}" fill="${s.farbe}" stroke="#1a1f3a" stroke-width="1.3"/>`;
    winkel = naechster;
  });
  return `<svg viewBox="0 0 ${groesse} ${groesse}" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <circle cx="${cx}" cy="${cy}" r="${r + 2.5}" fill="none" stroke="#1a1f3a" stroke-width="2.5"/>
    ${pfade}
    <circle cx="${cx}" cy="${cy}" r="3.5" fill="#1a1f3a"/>
    <polygon points="${cx - 6},1 ${cx + 6},1 ${cx},11" fill="#F0F0FF" stroke="#1a1f3a" stroke-width="1"/>
  </svg>`;
}
const WUERFEL_PIPS = {
  1: [[23,23]], 2: [[14,14],[32,32]], 3: [[14,14],[23,23],[32,32]],
  4: [[14,14],[32,14],[14,32],[32,32]], 5: [[14,14],[32,14],[23,23],[14,32],[32,32]],
  6: [[14,12],[32,12],[14,23],[32,23],[14,34],[32,34]],
};
function svgWuerfel(zahl, groesse, hervorgehoben) {
  const punkte = (WUERFEL_PIPS[zahl] || []).map(([x,y]) => `<circle cx="${x}" cy="${y}" r="3" fill="#1a1f3a"/>`).join('');
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">
    <rect x="4" y="4" width="38" height="38" rx="8" fill="${hervorgehoben ? '#FFD93D' : '#F0F0FF'}" stroke="#1a1f3a" stroke-width="2.5"/>
    ${punkte}
  </svg>`;
}
function svgZweiWuerfel(a, b, groesse) {
  return `<div style="display:flex;gap:.5rem;">${svgWuerfel(a, groesse)}${svgWuerfel(b, groesse)}</div>`;
}
/* Legostein: 3 Landepositionen */
function svgLegostein(pos, groesse) {
  const noppen = (cx, cy) => `<circle cx="${cx}" cy="${cy}" r="3.4" fill="#e0453a" stroke="#1a1f3a" stroke-width="1.3"/>`;
  let inner = '';
  if (pos === 'oben') {
    inner = `<rect x="6" y="14" width="34" height="24" rx="4" fill="#FF7A47" stroke="#1a1f3a" stroke-width="2.4"/>
      ${noppen(15,20)}${noppen(23,20)}${noppen(31,20)}`;
  } else if (pos === 'unten') {
    inner = `<rect x="6" y="14" width="34" height="24" rx="4" fill="#FF7A47" stroke="#1a1f3a" stroke-width="2.4"/>
      <rect x="10" y="30" width="26" height="4" rx="2" fill="#1a1f3a" opacity="0.25"/>`;
  } else {
    inner = `<rect x="10" y="8" width="16" height="34" rx="4" fill="#FF7A47" stroke="#1a1f3a" stroke-width="2.4" transform="rotate(6 23 23)"/>
      <circle cx="18" cy="14" r="2.6" fill="#e0453a" stroke="#1a1f3a" stroke-width="1" transform="rotate(6 23 23)"/>`;
  }
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">${inner}</svg>`;
}
/* Reißnagel: 2 Landepositionen */
function svgReissnagel(pos, groesse) {
  let inner = '';
  if (pos === 'spitzeOben') {
    inner = `<ellipse cx="23" cy="27" rx="15" ry="8" fill="#60A5FA" stroke="#1a1f3a" stroke-width="2.2"/>
      <polygon points="23,4 26,20 20,20" fill="#A6AEDB" stroke="#1a1f3a" stroke-width="1.6"/>`;
  } else {
    inner = `<ellipse cx="18" cy="18" rx="13" ry="7" fill="#60A5FA" stroke="#1a1f3a" stroke-width="2.2" transform="rotate(-24 18 18)"/>
      <polygon points="27,25 40,39 30,31" fill="#A6AEDB" stroke="#1a1f3a" stroke-width="1.6"/>`;
  }
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">${inner}</svg>`;
}
/* Becher: 3 Landepositionen */
function svgBecher(pos, groesse) {
  let inner = '';
  if (pos === 'steht') {
    inner = `<path d="M14 8 L32 8 L29 40 L17 40 Z" fill="#C084FC" stroke="#1a1f3a" stroke-width="2.2"/>
      <ellipse cx="23" cy="8" rx="9" ry="2.8" fill="#e2c2fb" stroke="#1a1f3a" stroke-width="1.6"/>`;
  } else if (pos === 'kopf') {
    inner = `<path d="M17 6 L29 6 L32 38 L14 38 Z" fill="#C084FC" stroke="#1a1f3a" stroke-width="2.2"/>
      <ellipse cx="23" cy="38" rx="9" ry="2.8" fill="#e2c2fb" stroke="#1a1f3a" stroke-width="1.6"/>
      <ellipse cx="23" cy="6" rx="6" ry="2" fill="#8a52ad" stroke="#1a1f3a" stroke-width="1.4"/>`;
  } else {
    inner = `<path d="M6 18 L38 15 L36 27 L8 30 Z" fill="#C084FC" stroke="#1a1f3a" stroke-width="2.2"/>
      <ellipse cx="7" cy="24" rx="2.8" ry="9" fill="#e2c2fb" stroke="#1a1f3a" stroke-width="1.6" transform="rotate(-8 7 24)"/>`;
  }
  return `<svg viewBox="0 0 46 46" width="${groesse}" height="${groesse}" style="display:block;flex-shrink:0;">${inner}</svg>`;
}

/* ═══════════════════════ Verlaufsdiagramm (SVG, live) ═══════════════════════ */
function svgVerlauf(punkte, refs, w, h) {
  w = w || 620; h = h || 230;
  const padL = 42, padR = 16, padT = 16, padB = 30;
  const plotW = w - padL - padR, plotH = h - padT - padB;
  const maxN = punkte.length ? punkte[punkte.length - 1].n : 1;
  const x = n => padL + (maxN <= 1 ? 0 : (n / maxN) * plotW);
  const y = rel => padT + (1 - rel) * plotH;

  let raster = '', labels = '';
  [0, 0.25, 0.5, 0.75, 1].forEach(f => {
    const yy = y(f).toFixed(1);
    raster += `<line x1="${padL}" x2="${w - padR}" y1="${yy}" y2="${yy}" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>`;
    labels += `<text x="${padL - 8}" y="${Number(yy) + 3}" font-size="9" fill="#A6AEDB" text-anchor="end">${Math.round(f * 100)}%</text>`;
  });

  let kurve = '', punktMarker = '';
  if (punkte.length) {
    let pts = punkte;
    if (pts.length > 240) {
      const k = Math.ceil(pts.length / 240);
      pts = pts.filter((_, i) => i % k === 0 || i === punkte.length - 1);
    }
    kurve = `<polyline points="${pts.map(p => `${x(p.n).toFixed(1)},${y(p.rel).toFixed(1)}`).join(' ')}" fill="none" stroke="#60A5FA" stroke-width="2.6" stroke-linejoin="round" stroke-linecap="round"/>`;
    const letzter = punkte[punkte.length - 1];
    punktMarker = `<circle cx="${x(letzter.n).toFixed(1)}" cy="${y(letzter.rel).toFixed(1)}" r="4.5" fill="#60A5FA" stroke="#1a1f3a" stroke-width="1.5"/>`;
  }

  let refLinien = '';
  (refs || []).forEach(r => {
    const yy = y(r.rel).toFixed(1);
    refLinien += `<line x1="${padL}" x2="${w - padR}" y1="${yy}" y2="${yy}" stroke="${r.farbe}" stroke-width="2.4" stroke-dasharray="7,5"/>`;
  });

  const nLabel = punkte.length ? `n = ${maxN}` : 'noch keine Versuche';

  return `<svg viewBox="0 0 ${w} ${h}" width="100%" height="${h}" style="display:block;">
    ${raster}${labels}
    <line x1="${padL}" x2="${padL}" y1="${padT}" y2="${h - padB}" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    <line x1="${padL}" x2="${w - padR}" y1="${h - padB}" y2="${h - padB}" stroke="rgba(255,255,255,0.18)" stroke-width="1.5"/>
    ${refLinien}
    ${kurve}${punktMarker}
    <text x="${w / 2}" y="${h - 6}" font-size="10" fill="#A6AEDB" text-anchor="middle">Anzahl Versuche  —  ${nLabel}</text>
  </svg>`;
}

/* ═══════════════════════ Spielzustand ═══════════════════════ */
const N_HAEUFIGKEIT = 50;      // Basis für die "erwartete Häufigkeit"-Frage
const MIN_ZUEGE_VOR_VERGLEICH = 50;
let spiel = null;

function neueRundenAuswahl() {
  const berechenbar = shuffle(RUNDEN_VORLAGEN.filter(r => r.typ === 'berechenbar')).slice(0, 2);
  const knifflig = shuffle(RUNDEN_VORLAGEN.filter(r => r.typ === 'knifflig')).slice(0, 1);
  return shuffle([...berechenbar, ...knifflig]).map(vorlage => ({
    vorlage,
    frageHaeufigkeit: vorlage.typ === 'berechenbar' && Math.random() < 0.5,
    schaetzProzent: null,
    schaetzHaeufigkeit: null,
    n: 0, treffer: 0, verlauf: [], letzterZug: null,
  }));
}

function zeigeIntro() {
  setMainHTML(`
    <div class="m4-karte m4-transition">
      <div class="m4-transition-emoji">🔮</div>
      <div class="m4-transition-titel">Schätzen, rechnen, ausprobieren</div>
      <p class="m4-transition-text">Bei jedem der folgenden drei Zufallsexperimente machst du zuerst eine <strong>Vorüberlegung</strong>: Wie wahrscheinlich ist ein bestimmtes Ereignis? Manchmal lässt sich das genau berechnen — manchmal kannst du es nur schätzen.</p>
      <p class="m4-transition-text">Danach <strong>simulierst</strong> du das Experiment ganz oft und schaust: Wie nah kommt die tatsächliche relative Häufigkeit an deine Vorhersage heran?</p>
      <button class="btn btn-orange" onclick="starteRunde(0)">Los geht's →</button>
    </div>
  `);
}

function starteSpiel() {
  spiel = { runden: neueRundenAuswahl(), idx: 0 };
}

function starteRunde(idx) {
  if (!spiel) starteSpiel();
  spiel.idx = idx;
  renderVorueberlegung();
}

function aktRunde() { return spiel.runden[spiel.idx]; }

/* ── Phase 1: Vorüberlegung ── */
function renderVorueberlegung() {
  const r = aktRunde();
  const v = r.vorlage;

  const legendeHtml = v.legende ? `<div class="m4-legende-row">${v.legende.map(l => `<div class="m4-legende-item"><span class="m4-legende-dot" style="background:${l.farbe}"></span>${l.label}</div>`).join('')}</div>` : '';

  const haeufigkeitBlock = r.frageHaeufigkeit ? `
    <div class="m4-eingabe-block">
      <div class="m4-eingabe-label">Bei ${N_HAEUFIGKEIT} Versuchen erwarte ich ungefähr …</div>
      <div class="m4-eingabe-row">
        <input type="number" id="eingabeHaeufigkeit" min="0" max="${N_HAEUFIGKEIT}" placeholder="?">
        <span class="m4-eingabe-suffix">von ${N_HAEUFIGKEIT} Versuchen Treffer</span>
      </div>
    </div>` : '';

  setMainHTML(`
    <div class="m4-fortschritt">
      <span><span class="m4-runde-badge">Runde ${spiel.idx + 1} von ${spiel.runden.length}</span>Vorüberlegung</span>
      <span class="m4-phase-info">${v.typ === 'berechenbar' ? '📐 berechenbar' : '❓ nur schätzbar'}</span>
    </div>
    <div class="m4-karte">
      <div class="m4-experiment-row">
        <div class="m4-experiment-badge">${v.badgeEmoji} ${v.kategorie}</div>
      </div>
      <div class="m4-titel">Was denkst du?</div>
      <div class="m4-objekt-flex">
        <div class="m4-objekt-icon">${v.icon()}</div>
        <div class="m4-aufbau-text">${v.aufbauHTML}</div>
      </div>
      ${legendeHtml}
      <div class="m4-ereignis-frage" style="margin-top:1rem;">${v.ereignisHTML}</div>

      <div class="m4-eingabe-block">
        <div class="m4-eingabe-label">Meine Schätzung der Wahrscheinlichkeit:</div>
        <div class="m4-eingabe-row">
          <input type="number" id="eingabeProzent" min="0" max="100" placeholder="?">
          <span class="m4-eingabe-suffix">%</span>
        </div>
      </div>
      ${haeufigkeitBlock}
      ${v.typ === 'knifflig' ? `<div class="m4-hinweis-klein">Hier gibt es keine Formel — nur dein Gefühl zählt. Gleich testen wir, wie gut es war.</div>` : ''}

      <div class="m4-weiter-row">
        <button class="btn btn-orange" onclick="uebernehmeVorueberlegung()">Weiter zur Simulation →</button>
      </div>
    </div>
  `);
}

function uebernehmeVorueberlegung() {
  const r = aktRunde();
  const pEl = document.getElementById('eingabeProzent');
  let p = parseFloat(pEl.value);
  if (isNaN(p)) p = null; else p = Math.max(0, Math.min(100, p));
  r.schaetzProzent = p;

  if (r.frageHaeufigkeit) {
    const hEl = document.getElementById('eingabeHaeufigkeit');
    let h = parseFloat(hEl.value);
    if (isNaN(h)) h = null; else h = Math.max(0, Math.min(N_HAEUFIGKEIT, h));
    r.schaetzHaeufigkeit = h;
  }
  renderSimulation();
}

/* ── Phase 2: Simulation ── */
function renderSimulation() {
  const r = aktRunde();
  const v = r.vorlage;
  const relJetzt = r.n ? r.treffer / r.n : null;

  const refs = [];
  if (v.theoretisch !== null) refs.push({ rel: v.theoretisch, farbe: '#4ECDC4' });
  if (r.schaetzProzent !== null) refs.push({ rel: r.schaetzProzent / 100, farbe: '#FFD93D' });

  const letzterZugHtml = r.letzterZug
    ? `<div class="m4-letzter-zug">
         <div class="m4-letzter-zug-label">Letzter Zug</div>
         ${r.letzterZug.visual}
         <div class="m4-letzter-zug-ergebnis ${r.letzterZug.treffer ? 'treffer' : ''}">${r.letzterZug.label}${r.letzterZug.treffer ? ' ✓' : ''}</div>
       </div>`
    : `<div class="m4-objekt-icon">${v.icon()}</div>`;

  const kannWeiter = r.n >= MIN_ZUEGE_VOR_VERGLEICH;

  setMainHTML(`
    <div class="m4-fortschritt">
      <span><span class="m4-runde-badge">Runde ${spiel.idx + 1} von ${spiel.runden.length}</span>Simulation</span>
      <span class="m4-phase-info">${v.ereignisHTML.replace(/<[^>]+>/g,'')}</span>
    </div>
    <div class="m4-karte">
      <div class="m4-titel">Jetzt wird ausprobiert</div>
      <div class="m4-beschreibung">Ziehe/wirf so oft du willst und beobachte, wie sich die relative Häufigkeit einpendelt.</div>

      <div class="m4-sim-stage">${letzterZugHtml}</div>

      <div class="m4-zieh-buttons">
        <button class="btn btn-mint" onclick="ziehe(1)">1×</button>
        <button class="btn btn-mint" onclick="ziehe(10)">10×</button>
        <button class="btn btn-mint" onclick="ziehe(100)">100×</button>
        <button class="btn btn-mint" onclick="ziehe(500)">500×</button>
      </div>

      <div class="m4-stats-row">
        <div class="m4-stat"><div class="m4-stat-wert">${r.n}</div><div class="m4-stat-label">Versuche</div></div>
        <div class="m4-stat"><div class="m4-stat-wert">${r.treffer}</div><div class="m4-stat-label">Treffer</div></div>
        <div class="m4-stat"><div class="m4-stat-wert mint">${relJetzt !== null ? (relJetzt*100).toFixed(1)+' %' : '—'}</div><div class="m4-stat-label">rel. Häufigkeit</div></div>
      </div>

      <div class="m4-chart-wrap">
        <div id="chartArea">${svgVerlauf(r.verlauf, refs)}</div>
        <div class="m4-chart-legende">
          <div class="m4-chart-legende-item"><span class="m4-chart-legende-linie" style="border-color:#60A5FA;"></span>tatsächliche relative Häufigkeit</div>
          ${v.theoretisch !== null ? `<div class="m4-chart-legende-item"><span class="m4-chart-legende-linie dashed" style="border-color:#4ECDC4;"></span>berechnete Wahrscheinlichkeit</div>` : ''}
          ${r.schaetzProzent !== null ? `<div class="m4-chart-legende-item"><span class="m4-chart-legende-linie dashed" style="border-color:#FFD93D;"></span>deine Schätzung</div>` : ''}
        </div>
      </div>

      ${!kannWeiter ? `<div class="m4-sim-hinweis">Mach mindestens ${MIN_ZUEGE_VOR_VERGLEICH} Versuche, bevor du zum Vergleich weitergehst — sonst sagt die Häufigkeit noch nicht viel aus.</div>` : ''}

      <div class="m4-weiter-row">
        <button class="btn btn-orange" ${kannWeiter ? '' : 'disabled style="opacity:.4;cursor:default;"'} onclick="renderVergleich()">Weiter zum Vergleich →</button>
      </div>
    </div>
  `);
}

function ziehe(anzahl) {
  const r = aktRunde();
  const v = r.vorlage;
  let letzt = null;
  for (let i = 0; i < anzahl; i++) {
    const ergebnis = v.ziehen();
    r.n++;
    if (ergebnis.treffer) r.treffer++;
    r.verlauf.push({ n: r.n, rel: r.treffer / r.n });
    letzt = ergebnis;
  }
  r.letzterZug = letzt;
  renderSimulation();
}

/* ── Phase 3: Vergleich ── */
function renderVergleich() {
  const r = aktRunde();
  const v = r.vorlage;
  const relIst = r.treffer / r.n;
  const theoProzent = v.theoretisch !== null ? v.theoretisch * 100 : null;

  let zeilen = `<tr><td>Deine Schätzung</td><td>${r.schaetzProzent !== null ? r.schaetzProzent + ' %' : '—'}</td></tr>`;
  if (theoProzent !== null) {
    zeilen += `<tr><td>Berechnete Wahrscheinlichkeit</td><td>${rund1(theoProzent)} %</td></tr>`;
  }
  zeilen += `<tr class="hervor"><td>Tatsächliche relative Häufigkeit (n=${r.n})</td><td>${rund1(relIst*100)} %</td></tr>`;

  if (r.frageHaeufigkeit) {
    zeilen += `<tr><td>Deine erwartete Häufigkeit (bei ${N_HAEUFIGKEIT})</td><td>${r.schaetzHaeufigkeit !== null ? r.schaetzHaeufigkeit : '—'}</td></tr>`;
    if (theoProzent !== null) {
      const erwartet = v.theoretisch * N_HAEUFIGKEIT;
      zeilen += `<tr><td>Berechnete erwartete Häufigkeit (n·p)</td><td>${rund1(erwartet)}</td></tr>`;
    }
  }

  let fazit;
  if (v.typ === 'berechenbar') {
    const diff = Math.abs(relIst*100 - theoProzent);
    const nah = diff <= 5;
    fazit = `Die berechnete Wahrscheinlichkeit lag bei <strong>${rund1(theoProzent)} %</strong>. Nach ${r.n} Versuchen lag die tatsächliche relative Häufigkeit bei <strong>${rund1(relIst*100)} %</strong> — das ist ${nah ? 'sehr nah dran' : 'noch etwas entfernt, aber je mehr Versuche, desto näher wird es'}. Genau das beschreibt das <strong>Gesetz der großen Zahlen</strong>: Je öfter man wiederholt, desto mehr nähert sich die relative Häufigkeit der berechneten Wahrscheinlichkeit an.`;
  } else {
    fazit = `Hier gab es keine Formel, mit der du die Wahrscheinlichkeit vorher berechnen konntest — du konntest sie nur schätzen. Nach ${r.n} Versuchen zeigt sich: Die relative Häufigkeit pendelt sich bei ungefähr <strong>${rund1(relIst*100)} %</strong> ein. Das ist jetzt die beste Schätzung, die wir für diese Wahrscheinlichkeit haben — man nennt sie <strong>statistische Wahrscheinlichkeit</strong>.`;
  }

  const istLetzte = spiel.idx >= spiel.runden.length - 1;

  setMainHTML(`
    <div class="m4-fortschritt">
      <span><span class="m4-runde-badge">Runde ${spiel.idx + 1} von ${spiel.runden.length}</span>Vergleich</span>
      <span class="m4-phase-info">${v.badgeEmoji} ${v.kategorie}</span>
    </div>
    <div class="m4-karte">
      <div class="m4-titel">Wie nah lagst du dran?</div>
      <table class="m4-vergleich-tabelle">${zeilen}</table>
      <div class="m4-vergleich-fazit ${v.typ === 'knifflig' ? 'knifflig' : ''}">${fazit}</div>
      <div class="m4-weiter-row">
        <button class="btn btn-orange" onclick="${istLetzte ? 'zeigeAuswertung()' : `starteRunde(${spiel.idx + 1})`}">${istLetzte ? 'Zur Auswertung →' : 'Nächste Runde →'}</button>
      </div>
    </div>
  `);
}

/* ── Auswertung + Merksatz ── */
function zeigeAuswertung() {
  const karten = spiel.runden.map(r => {
    const v = r.vorlage;
    const relIst = r.treffer / r.n;
    return `<div class="m4-uebersicht-karte">
      <div class="m4-uebersicht-titel">${v.badgeEmoji} ${v.kategorie}</div>
      <div class="m4-uebersicht-zeile"><span>Deine Schätzung</span><strong>${r.schaetzProzent ?? '—'} %</strong></div>
      ${v.theoretisch !== null ? `<div class="m4-uebersicht-zeile"><span>Berechnete Wahrscheinlichkeit</span><strong>${rund1(v.theoretisch*100)} %</strong></div>` : ''}
      <div class="m4-uebersicht-zeile"><span>Relative Häufigkeit (n=${r.n})</span><strong>${rund1(relIst*100)} %</strong></div>
    </div>`;
  }).join('');

  setMainHTML(`
    <div class="m4-karte m4-transition">
      <div class="m4-transition-emoji">📊</div>
      <div class="m4-transition-titel">Deine drei Runden im Überblick</div>
      <div style="max-width:480px;margin:0 auto 1.4rem;text-align:left;">${karten}</div>
      <button class="btn btn-orange" onclick="zeigeMerksatz()">Weiter zum Merksatz →</button>
    </div>
  `);
}

function zeigeMerksatz() {
  setMainHTML(`
    <div class="m4-karte m4-ende">
      <div class="m4-ende-emoji">🔮</div>
      <div class="m4-ende-titel">Vorhersage vs. Wirklichkeit</div>

      <div class="m4-merksatz-box">
        <div class="m4-merksatz-label">Merksatz</div>
        <p>Bei manchen Zufallsexperimenten kannst du die Wahrscheinlichkeit vorher <strong>berechnen</strong> (z. B. mit der Laplace-Formel). Bei anderen kennst du die Struktur nicht genau genug — dann kannst du sie nur <strong>schätzen</strong> und durch viele Versuche herausfinden. Man nennt das die <strong>statistische Wahrscheinlichkeit</strong>: die relative Häufigkeit eines Ereignisses nach sehr vielen Versuchen.</p>
        <p><strong>Gesetz der großen Zahlen:</strong> Je öfter man ein Zufallsexperiment wiederholt, desto mehr nähert sich die relative Häufigkeit einer festen Zahl an. Bei einem einzelnen Versuch oder wenigen Versuchen kann das Ergebnis aber trotzdem stark abweichen — Zufall bleibt Zufall.</p>

      <p class="m4-transition-text">Damit hast du den vollen Kreis geschafft: Struktur aufbauen (Modul 1), übersichtlich darstellen (Modul 2), daraus eine Wahrscheinlichkeit berechnen (Modul 3) — und jetzt geprüft, ob diese Vorhersage auch wirklich eintrifft.</p>
