<script>
const { COLORS } = MathUtils;

/* ── Themen-Pool für Zufallsdaten ── */
const THEMEN = [
  { titel: 'Lieblingsfarben der Klasse',      einheit: 'Kinder',   kategorien: ['Rot','Blau','Grün','Gelb','Lila','Türkis'] },
  { titel: 'Haustiere im Straßenzug',         einheit: 'Haushalte',kategorien: ['Hund','Katze','Hamster','Fisch','Vogel','Keins'] },
  { titel: 'Lieblingssportarten',             einheit: 'Kinder',   kategorien: ['Fußball','Schwimmen','Tennis','Reiten','Turnen','Tanzen'] },
  { titel: 'Verkaufte Eissorten im Sommer',   einheit: 'Kugeln',   kategorien: ['Vanille','Schokolade','Erdbeere','Zitrone','Stracciatella'] },
  { titel: 'Getränke in der Pause',           einheit: 'Kinder',   kategorien: ['Wasser','Saft','Kakao','Tee','Limonade'] },
  { titel: 'Wetter im letzten Monat',         einheit: 'Tage',     kategorien: ['Sonnig','Bewölkt','Regen','Schnee','Nebel'], maxSumme: 31 },
  { titel: 'Schulweg der Kinder',             einheit: 'Kinder',   kategorien: ['zu Fuß','Fahrrad','Bus','Auto','Bahn'] },
  { titel: 'Musikgeschmack der Klasse',       einheit: 'Kinder',   kategorien: ['Pop','Hip-Hop','Rock','Klassik','Electro'] },
  { titel: 'Lieblingsfach',                   einheit: 'Kinder',   kategorien: ['Mathe','Sport','Kunst','Musik','Deutsch','Englisch'] },
  { titel: 'Besuchte Länder im Urlaub',       einheit: 'Familien', kategorien: ['Italien','Spanien','Türkei','Deutschland','Frankreich'] },
];

const ANZAHL_RUNDEN = 5;
const FRAGEN_PRO_RUNDE = 3;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function randInt(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

/* Verteilt `summe` als `anzahl` positive Ganzzahlen (jede >= 1), Summe exakt = `summe` */
function verteileSumme(anzahl, summe) {
  const werte = new Array(anzahl).fill(1);
  let rest = summe - anzahl;
  while (rest > 0) {
    werte[randInt(0, anzahl - 1)]++;
    rest--;
  }
  return shuffle(werte);
}

/* ── Rundendaten erzeugen ── */
function erzeugeRunde() {
  const thema = THEMEN[randInt(0, THEMEN.length - 1)];
  const anzahlKategorien = randInt(4, Math.min(6, thema.kategorien.length));
  const kategorien = shuffle(thema.kategorien).slice(0, anzahlKategorien);
  const daten = {};
  if (thema.maxSumme) {
    // z.B. Wetter: nie mehr "Tage" verteilen, als ein Monat hat
    const gesamt = randInt(Math.max(anzahlKategorien, thema.maxSumme - 5), thema.maxSumme);
    const werte = verteileSumme(anzahlKategorien, gesamt);
    kategorien.forEach((k, i) => { daten[k] = werte[i]; });
  } else {
    kategorien.forEach(k => { daten[k] = randInt(2, 18); });
  }
  const chartTyp = Math.random() < 0.5 ? 'saeulen' : 'balken';

  const fragenPool = [erzeugeMaxFrage, erzeugeMinFrage, erzeugeSpannweiteFrage, erzeugeDurchschnittFrage, erzeugeVergleichFrage];
  const fragen = shuffle(fragenPool).slice(0, FRAGEN_PRO_RUNDE).map(fn => fn(daten));

  return { thema, daten, chartTyp, fragen };
}

/* ── Fragen-Generatoren ── */
function erzeugeMaxFrage(daten) {
  const entries = Object.entries(daten);
  const maxVal = Math.max(...entries.map(([,v]) => v));
  return {
    frage: 'Welche Kategorie hat den höchsten Wert?',
    typ: 'kategorie',
    optionen: shuffle(entries.map(([k]) => k)),
    check: (antwort) => daten[antwort] === maxVal,
    loesungstext: () => {
      const richtige = entries.filter(([,v]) => v === maxVal).map(([k]) => k);
      return `Richtig: ${richtige.join(' oder ')} (Wert ${maxVal})`;
    }
  };
}

function erzeugeMinFrage(daten) {
  const entries = Object.entries(daten);
  const minVal = Math.min(...entries.map(([,v]) => v));
  return {
    frage: 'Welche Kategorie hat den kleinsten Wert?',
    typ: 'kategorie',
    optionen: shuffle(entries.map(([k]) => k)),
    check: (antwort) => daten[antwort] === minVal,
    loesungstext: () => {
      const richtige = entries.filter(([,v]) => v === minVal).map(([k]) => k);
      return `Richtig: ${richtige.join(' oder ')} (Wert ${minVal})`;
    }
  };
}

function erzeugeSpannweiteFrage(daten) {
  const vals = Object.values(daten);
  const max = Math.max(...vals), min = Math.min(...vals);
  const span = max - min;
  return {
    frage: 'Wie groß ist die Spannweite (größter Wert minus kleinster Wert)?',
    typ: 'zahl-exakt',
    check: (antwort) => Number(antwort) === span,
    loesungstext: () => `Spannweite = ${max} − ${min} = ${span}`
  };
}

function erzeugeDurchschnittFrage(daten) {
  const vals = Object.values(daten);
  const summe = vals.reduce((a,b) => a+b, 0);
  const mittel = summe / vals.length;
  const toleranz = Math.max(1, mittel * 0.13);
  const alsMC = Math.random() < 0.5;

  if (alsMC) {
    const richtig = Math.round(mittel);
    const distraktoren = new Set();
    while (distraktoren.size < 3) {
      const offset = randInt(2, 4) * (Math.random() < 0.5 ? -1 : 1);
      const kandidat = Math.max(0, richtig + offset);
      if (kandidat !== richtig) distraktoren.add(kandidat);
    }
    return {
      frage: 'Was ist ungefähr der Durchschnitt (Mittelwert) aller Werte?',
      typ: 'mc-zahl',
      optionen: shuffle([richtig, ...distraktoren]),
      check: (antwort) => Number(antwort) === richtig,
      loesungstext: () => `Durchschnitt = ${summe} ÷ ${vals.length} = ${mittel.toFixed(2)} ≈ ${richtig}`
    };
  }
  return {
    frage: 'Schätze den Durchschnitt (Mittelwert) aller Werte (kleine Abweichung ist ok).',
    typ: 'zahl-toleranz',
    check: (antwort) => Math.abs(Number(antwort) - mittel) <= toleranz,
    loesungstext: () => `Durchschnitt = ${summe} ÷ ${vals.length} = ${mittel.toFixed(2)} (± ${toleranz.toFixed(1)} war ok)`
  };
}

function erzeugeVergleichFrage(daten) {
  const entries = shuffle(Object.entries(daten)).slice(0, 2);
  const [[keyA, valA], [keyB, valB]] = entries;
  const diff = Math.abs(valA - valB);
  const ratio = valB === 0 ? null : valA / valB;
  const nice = (r,t,eps) => Math.abs(r-t) <= eps;

  const kandidaten = [];

  if (valA !== valB) {
    const [hi, lo] = valA > valB ? [keyA, keyB] : [keyB, keyA];
    kandidaten.push({ text: `„${hi}" kommt häufiger vor als „${lo}".`, wahr: true });
    kandidaten.push({ text: `„${lo}" kommt häufiger vor als „${hi}".`, wahr: false });
  } else {
    kandidaten.push({ text: `„${keyA}" kommt genauso oft vor wie „${keyB}".`, wahr: true });
    kandidaten.push({ text: `„${keyA}" kommt häufiger vor als „${keyB}".`, wahr: false });
  }

  if (ratio !== null) {
    let faktor = null;
    if (nice(ratio, 2, 0.2) || nice(ratio, 0.5, 0.12)) faktor = 'doppelt';
    else if (nice(ratio, 3, 0.25) || nice(ratio, 1/3, 0.08)) faktor = 'dreimal';
    if (faktor) {
      const [gross, klein] = ratio >= 1 ? [keyA, keyB] : [keyB, keyA];
      kandidaten.push({ text: `„${gross}" kommt etwa ${faktor} so oft vor wie „${klein}".`, wahr: true });
      const falscherFaktor = faktor === 'doppelt' ? 'dreimal' : 'doppelt';
      kandidaten.push({ text: `„${gross}" kommt etwa ${falscherFaktor} so oft vor wie „${klein}".`, wahr: false });
    }
  }

  if (diff > 0) {
    const [hi, lo] = valA > valB ? [keyA, keyB] : [keyB, keyA];
    kandidaten.push({ text: `„${hi}" hat genau ${diff} mehr als „${lo}".`, wahr: true });
    let falscheZahl = diff + (Math.random() < 0.5 ? 1 : -1) * randInt(1, 2);
    if (falscheZahl <= 0) falscheZahl = diff + 2;
    kandidaten.push({ text: `„${hi}" hat genau ${falscheZahl} mehr als „${lo}".`, wahr: false });
  }

  const wahrePool   = kandidaten.filter(k => k.wahr);
  const falschePool = kandidaten.filter(k => !k.wahr);
  const nimmWahr = Math.random() < 0.5;
  const gewaehlt = nimmWahr
    ? wahrePool[randInt(0, wahrePool.length - 1)]
    : falschePool[randInt(0, falschePool.length - 1)];

  return {
    frage: 'Stimmt diese Aussage?',
    typ: 'wahr-falsch',
    aussage: gewaehlt.text,
    check: (antwort) => antwort === gewaehlt.wahr,
    loesungstext: () => gewaehlt.wahr ? 'Die Aussage stimmt! ✓' : `Stimmt nicht. Z.B. richtig: ${wahrePool[0].text}`
  };
}

/* ── Spielzustand & Rendering ── */
let rundenIndex = 0, frageIndex = 0, punkte = 0;
let aktuelleRunde = null;
let beantwortet = false;

function starteSpiel() {
  rundenIndex = 0; punkte = 0;
  aktuelleRunde = erzeugeRunde();
  frageIndex = 0;
  renderAlles();
}

function renderAlles() {
  const el = document.getElementById('mainArea');
  const { thema, daten, chartTyp } = aktuelleRunde;
  const frage = aktuelleRunde.fragen[frageIndex];

  el.innerHTML = `
    <div class="an-fortschritt">
      <span>Diagramm ${rundenIndex + 1} von ${ANZAHL_RUNDEN} · Frage ${frageIndex + 1} von ${FRAGEN_PRO_RUNDE}</span>
      <span class="an-punkte">★ ${punkte} / ${ANZAHL_RUNDEN * FRAGEN_PRO_RUNDE}</span>
    </div>
    <div class="an-karte">
      <div class="an-thema-titel">${thema.titel}</div>
      <div class="an-canvas-wrap"><canvas id="chartCanvas"></canvas></div>
    </div>
    <div class="an-frage-karte" id="frageKarte">
      <div class="an-frage-nr">Frage ${frageIndex + 1}</div>
      <div class="an-frage-text">${frage.frage}</div>
      ${frage.typ === 'wahr-falsch' ? `<div class="an-aussage">${frage.aussage}</div>` : ''}
      <div id="antwortBereich"></div>
      <div class="an-feedback" id="feedback"></div>
      <div class="an-weiter-row" id="weiterRow"></div>
    </div>
  `;

  const canvas = document.getElementById('chartCanvas');
  if (chartTyp === 'saeulen') Charts.renderSaeulen(canvas, daten, thema.titel, { achsenTitel: thema.einheit });
  else Charts.renderBalken(canvas, daten, thema.titel, {});

  renderAntwortBereich(frage);
}

function renderAntwortBereich(frage) {
  beantwortet = false;
  const bereich = document.getElementById('antwortBereich');

  if (frage.typ === 'kategorie' || frage.typ === 'mc-zahl') {
    bereich.innerHTML = `<div class="an-optionen">${
      frage.optionen.map(opt => `<button class="an-opt-btn" data-opt="${opt}" onclick="antwortenOption(this)">${opt}</button>`).join('')
    }</div>`;
  } else if (frage.typ === 'wahr-falsch') {
    bereich.innerHTML = `<div class="an-optionen">
      <button class="an-opt-btn" data-opt="true"  onclick="antwortenWahrFalsch(this, true)">✅ Wahr</button>
      <button class="an-opt-btn" data-opt="false" onclick="antwortenWahrFalsch(this, false)">❌ Falsch</button>
    </div>`;
  } else if (frage.typ === 'zahl-exakt' || frage.typ === 'zahl-toleranz') {
    bereich.innerHTML = `<div class="an-eingabe-row">
      <input type="number" id="zahlInput" placeholder="?">
      <button class="btn btn-mint" onclick="antwortenZahl()">Prüfen</button>
    </div>`;
    document.getElementById('zahlInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') antwortenZahl();
    });
  }
}

function antwortenOption(btn) {
  if (beantwortet) return;
  beantwortet = true;
  const frage = aktuelleRunde.fragen[frageIndex];
  const wert = btn.dataset.opt;
  const istRichtig = frage.typ === 'mc-zahl' ? frage.check(Number(wert)) : frage.check(wert);
  auswerten(istRichtig, frage);
  document.querySelectorAll('.an-opt-btn').forEach(b => {
    b.disabled = true;
    const bWert = frage.typ === 'mc-zahl' ? Number(b.dataset.opt) : b.dataset.opt;
    const bRichtig = frage.typ === 'mc-zahl' ? frage.check(bWert) : frage.check(bWert);
    if (bRichtig) b.classList.add('richtig');
    else if (b === btn) b.classList.add('falsch');
  });
}

function antwortenWahrFalsch(btn, wert) {
  if (beantwortet) return;
  beantwortet = true;
  const frage = aktuelleRunde.fragen[frageIndex];
  const istRichtig = frage.check(wert);
  auswerten(istRichtig, frage);
  document.querySelectorAll('.an-opt-btn').forEach(b => {
    b.disabled = true;
    const bWert = b.dataset.opt === 'true';
    if (frage.check(bWert)) b.classList.add('richtig');
    else if (b === btn) b.classList.add('falsch');
  });
}

function antwortenZahl() {
  if (beantwortet) return;
  const input = document.getElementById('zahlInput');
  if (input.value === '') return;
  beantwortet = true;
  const frage = aktuelleRunde.fragen[frageIndex];
  const istRichtig = frage.check(input.value);
  input.disabled = true;
  auswerten(istRichtig, frage);
}

function auswerten(istRichtig, frage) {
  if (istRichtig) punkte++;
  const fb = document.getElementById('feedback');
  fb.textContent = (istRichtig ? '✅ Richtig! ' : '❌ Leider nicht. ') + frage.loesungstext();
  fb.className = 'an-feedback ' + (istRichtig ? 'richtig' : 'falsch');

  document.getElementById('weiterRow').innerHTML =
    `<button class="btn btn-yellow" onclick="weiter()">Weiter →</button>`;
}

function weiter() {
  frageIndex++;
  if (frageIndex >= FRAGEN_PRO_RUNDE) {
    rundenIndex++;
    if (rundenIndex >= ANZAHL_RUNDEN) { zeigeEnde(); return; }
    aktuelleRunde = erzeugeRunde();
    frageIndex = 0;
  }
  renderAlles();
}

function zeigeEnde() {
  const gesamt = ANZAHL_RUNDEN * FRAGEN_PRO_RUNDE;
  const quote = punkte / gesamt;
  const emoji = quote >= 0.8 ? '🏆' : quote >= 0.5 ? '🎉' : '💪';
  const spruch = quote >= 0.8 ? 'Stark gelesen!' : quote >= 0.5 ? 'Gut gemacht!' : 'Weiter üben lohnt sich!';

  document.getElementById('mainArea').innerHTML = `
    <div class="an-karte an-ende">
      <div class="an-ende-emoji">${emoji}</div>
      <div class="an-ende-titel">${spruch}</div>
      <div class="an-ende-score">Du hast <strong>${punkte} von ${gesamt}</strong> Fragen richtig beantwortet.</div>
      <button class="btn btn-mint" onclick="starteSpiel()">🔄 Nochmal spielen</button>
    </div>
  `;
}

starteSpiel();
</script>
<script src="../js/sidebar.js"></script>
